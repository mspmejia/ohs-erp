              form.tareas.map((t,i)=>(
                <div key={t.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',borderBottom:'1px solid #f0f0f0'}}>
                  <input type="checkbox" checked={t.estado==='completada'} onChange={()=>toggleTarea(t.id)} style={{accentColor:'#008000'}}/>
                  <span style={{flex:1,fontSize:13,textDecoration:t.estado==='completada'?'line-through':'none',color:t.estado==='completada'?'#aaa':'#333'}}>{t.nombre}</span>
                  <button onClick={()=>delTarea(t.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#e74c3c',fontSize:14,padding:'0 4px'}}>×</button>
                </div>
              ))}
            </div>
            {form.tareas.length>0&&<div style={{marginTop:6,fontSize:12,color:'#888'}}>{form.tareas.filter(t=>t.estado==='completada').length}/{form.tareas.length} tareas completadas</div>}
          </div>
          <div className="form-group">
            <label className="form-label">Cotizaciones Vinculadas</label>
            <div style={{maxHeight:140,overflowY:'auto',border:'1px solid var(--border)',borderRadius:8,padding:8}}>
              {state.cotizaciones.length===0?<div style={{color:'#aaa',fontSize:12,textAlign:'center',padding:8}}>Sin cotizaciones</div>:
              state.cotizaciones.map(c=>(
                <label key={c.id} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 4px',fontSize:12,cursor:'pointer'}}>
                  <input type="checkbox" checked={form.cotizacionIds.includes(c.id)} onChange={e=>{
                    setForm(f=>({...f,cotizacionIds:e.target.checked?[...f.cotizacionIds,c.id]:f.cotizacionIds.filter(x=>x!==c.id)}));
                  }} style={{accentColor:'#FF8C00'}}/>
                  <span>{c.numero} — {c.cliente?.empresa||c.cliente?.nombre||'CF'} — {fmtQ(c.total)}</span>
                </label>
              ))}
            </div>
          </div>
        </div>
      </div>
      <div style={{marginTop:20,display:'flex',gap:8,justifyContent:'flex-end'}}>
        <button className="btn btn-secondary" onClick={()=>{setShowForm(false);setEditing(null);}}>Cancelar</button>
        <button className="btn btn-primary" onClick={save}><Icon name="check"/>Guardar Proyecto</button>
      </div>
    </div>
  );

  return (
    <div>
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        <input className="form-control" style={{width:260}} value={filter} onChange={e=>setFilter(e.target.value)} placeholder="🔍 Buscar por nombre, cliente o estado..."/>
        <div style={{display:'flex',gap:6}}>
          {['','planificado','en_progreso','completado'].map(s=>(
            <button key={s} onClick={()=>setFilter(s)}
              style={{padding:'5px 12px',borderRadius:20,border:'none',cursor:'pointer',fontSize:12,fontWeight:600,
                background:filter===s?(s?COLOR_PROY[s]:'#FF8C00'):'#f0f0f0',
                color:filter===s?'#fff':'#555'}}>
              {s===''?'Todos':s.replace('_',' ')}
            </button>
          ))}
        </div>
        {canEdit&&<button className="btn btn-primary" onClick={()=>{setEditing(null);setForm(empty);setShowForm(true);}} style={{marginLeft:'auto'}}><Icon name="plus"/>Nuevo Proyecto</button>}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
        {ESTADOS_PROY.slice(0,4).map(est=>{
          const n=(state.proyectos||[]).filter(p=>p.estado===est).length;
          return <StatCard2 key={est} label={est.replace('_',' ').toUpperCase()} value={n} sub="proyectos" color={COLOR_PROY[est]} icon={est==='completado'?'✅':est==='en_progreso'?'🔄':est==='cancelado'?'❌':'📋'}/>;
        })}
      </div>

      {proyectos.length===0?
        <div className="card" style={{padding:40,textAlign:'center',color:'#aaa'}}>Sin proyectos registrados. Crea tu primer proyecto.</div>:
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(360px,1fr))',gap:16}}>
          {proyectos.map(p=>{
            const prog = progreso(p);
            const cotCount = p.cotizacionIds?.length||0;
            const dias = p.fechaFin?Math.ceil((new Date(p.fechaFin)-new Date())/(1000*60*60*24)):null;
            return (
              <div key={p.id} className="card" style={{borderTop:`4px solid ${COLOR_PROY[p.estado]||'#aaa'}`,cursor:'pointer'}} onClick={()=>setSelected(selected?.id===p.id?null:p)}>
                <div style={{padding:'14px 16px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:14,fontFamily:'Montserrat,sans-serif',color:'#1a1a2e'}}>{p.nombre}</div>
                      <div style={{fontSize:12,color:'#888',marginTop:2}}>{p.cliente||'Sin cliente'}</div>
                    </div>
                    <span style={{background:COLOR_PROY[p.estado]||'#aaa',color:'#fff',borderRadius:20,padding:'3px 10px',fontSize:10,fontWeight:700,whiteSpace:'nowrap'}}>
                      {(p.estado||'sin estado').replace('_',' ')}
                    </span>
                  </div>
                  {p.descripcion&&<p style={{fontSize:12,color:'#666',margin:'0 0 10px',lineHeight:1.5}}>{p.descripcion.slice(0,100)}{p.descripcion.length>100?'...':''}</p>}
                  <div style={{marginBottom:8}}>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#888',marginBottom:4}}>
                      <span>Progreso</span><span>{prog}%</span>
                    </div>
                    <div style={{height:6,background:'#f0f0f0',borderRadius:3,overflow:'hidden'}}>
                      <div style={{width:`${prog}%`,height:'100%',background:COLOR_PROY[p.estado]||'#aaa',borderRadius:3,transition:'.3s'}}/>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:12,fontSize:11,color:'#888',flexWrap:'wrap'}}>
                    {p.fechaInicio&&<span>🗓 {fmtDate(p.fechaInicio)}</span>}
                    {p.fechaFin&&<span style={{color:dias!==null&&dias<0?'#c0392b':dias!==null&&dias<7?'#e67e00':'inherit'}}>🏁 {fmtDate(p.fechaFin)}{dias!==null&&<span style={{marginLeft:4}}>({dias>0?`${dias}d`:dias===0?'hoy':`${-dias}d vencido`})</span>}</span>}
                    {p.presupuesto>0&&<span>💰 {fmtQ(p.presupuesto)}</span>}
                    {cotCount>0&&<span>📄 {cotCount} cot.</span>}
                    {p.tareas?.length>0&&<span>✔ {p.tareas.filter(t=>t.estado==='completada').length}/{p.tareas.length}</span>}
                  </div>
                  {canEdit&&<div style={{display:'flex',gap:6,marginTop:10}} onClick={e=>e.stopPropagation()}>
                    <button className="btn btn-sm btn-outline" onClick={()=>{setEditing(p);setForm({...p});setShowForm(true);}}><Icon name="edit" size={12}/>Editar</button>
                    <button className="btn btn-sm btn-danger" onClick={()=>setConfirmDel(p.id)}><Icon name="trash" size={12}/></button>
                  </div>}
                </div>
                {selected?.id===p.id&&p.tareas?.length>0&&(
                  <div style={{borderTop:'1px solid #f0f0f0',padding:'10px 16px',background:'#fafafa'}}>
                    <div style={{fontSize:12,fontWeight:700,marginBottom:6,color:'#555'}}>TAREAS</div>
                    {p.tareas.map(t=>(
                      <div key={t.id} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0',fontSize:12}}>
                        <span style={{width:14,height:14,borderRadius:3,background:t.estado==='completada'?'#008000':'#ddd',display:'inline-block',flexShrink:0}}/>
                        <span style={{textDecoration:t.estado==='completada'?'line-through':'none',color:t.estado==='completada'?'#aaa':'#333'}}>{t.nombre}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      }
      {confirmDel&&<Confirm msg="¿Eliminar este proyecto permanentemente?" onYes={()=>{dispatch({type:'DEL_PROYECTO',payload:confirmDel});setConfirmDel(null);setSelected(null);}} onNo={()=>setConfirmDel(null)}/>}
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════
   ADMIN / CONFIGURACIÓN DEL SISTEMA
═══════════════════════════════════════════════════════════ */
const AdminConfig = ({state, dispatch}) => {
  const [tab, setTab] = useState('usuarios');
  const {user: currentUser} = React.useContext(AuthContext);

  // ── Usuarios ──
  const [usuariosDB, setUsuariosDB] = useState(()=>JSON.parse(localStorage.getItem('ohs_usuarios_extra')||'[]'));
  const [showUserForm, setShowUserForm] = useState(false);
  const [editingUser, setEditingUser] = useState(null);
  const [userForm, setUserForm] = useState({username:'',password:'',nombre:'',role:'admin',color:'#3498db'});
  const todosUsuarios = [...USERS, ...usuariosDB];

  const saveUser = () => {
    if(!userForm.username||!userForm.password||!userForm.nombre){alert('Completa todos los campos');return;}
    if(todosUsuarios.find(u=>u.username===userForm.username&&u.username!==editingUser?.username)){alert('Ese nombre de usuario ya existe');return;}
    const updated = editingUser
      ? usuariosDB.map(u=>u.username===editingUser.username?{...userForm}:u)
      : [...usuariosDB,{...userForm}];
    setUsuariosDB(updated);
    localStorage.setItem('ohs_usuarios_extra', JSON.stringify(updated));
    setShowUserForm(false); setEditingUser(null); setUserForm({username:'',password:'',nombre:'',role:'admin',color:'#3498db'});
  };
  const delUser = (username) => {
    const updated = usuariosDB.filter(u=>u.username!==username);
    setUsuariosDB(updated);
    localStorage.setItem('ohs_usuarios_extra', JSON.stringify(updated));
  };

  // ── Unidades ──
  const unidades = state.unidades || loadUnidades();
  const [showUniForm, setShowUniForm] = useState(false);
  const [editingUni, setEditingUni] = useState(null);
  const [uniForm, setUniForm] = useState({nombre:'',abreviatura:'',tipo:'otro'});
  const saveUni = () => {
    if(!uniForm.nombre||!uniForm.abreviatura){alert('Completa nombre y abreviatura');return;}
    const updated = editingUni
      ? unidades.map(u=>u===editingUni?{...uniForm}:u)
      : [...unidades,{...uniForm}];
    dispatch({type:'SET_UNIDADES', payload:updated});
    setShowUniForm(false); setEditingUni(null); setUniForm({nombre:'',abreviatura:'',tipo:'otro'});
  };
  const delUni = (idx) => dispatch({type:'SET_UNIDADES', payload:unidades.filter((_,i)=>i!==idx)});

  // ── Empresa ──
  const empresa = state.config_empresa || {nombre:'OHS Training GT',nit:'',direccion:'Guatemala, Guatemala',telefono:'(502) 56223829',email:'info@ohstraining.com',web:'gtohstraining.com',moneda:'Q',regimen:'Pequeño Contribuyente'};
  const [empForm, setEmpForm] = useState(empresa);
  const saveEmpresa = () => { dispatch({type:'SET_CONFIG_EMPRESA', payload:empForm}); alert('Configuración guardada.'); };

  // ── Backup ──
  const exportData = () => {
    const data = {
      ...Object.fromEntries(
        ['cotizaciones','clientes','transacciones','ordenes','proveedores','asientos','recetas','ordenes_produccion','productos','presupuestos','proyectos','pagosProveedores','pagosClientes']
        .map(k=>[k, state[k]||[]])
      ),
      unidades: state.unidades || loadUnidades(),
      usuarios_extra: JSON.parse(localStorage.getItem('ohs_usuarios_extra')||'[]'),
      config_empresa: state.config_empresa,
      exportedAt: new Date().toISOString(),
      version: '1.1'
    };
    const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=`OHS_backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
  };
  const importData = (e) => {
    const file = e.target.files[0]; if(!file)return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if(window.confirm('¿Importar datos? Esto sobreescribirá todos los datos actuales.')){
          dispatch({type:'IMPORT_DATA', payload:data});
          if(data.unidades) { dispatch({type:'SET_UNIDADES', payload:data.unidades}); localStorage.setItem('ohs_unidades', JSON.stringify(data.unidades)); }
          if(data.usuarios_extra) localStorage.setItem('ohs_usuarios_extra', JSON.stringify(data.usuarios_extra));
          alert('Datos importados correctamente.');
        }
      } catch { alert('Archivo inválido. Solo se aceptan backups en formato JSON.'); }
    };
    reader.readAsText(file);
  };
  const clearData = () => {
    if(window.confirm('⚠️ ¿Eliminar TODOS los datos? Esta acción NO se puede deshacer.\n\nEscribe CONFIRMAR en el siguiente cuadro.')){
      const conf = window.prompt('Escribe CONFIRMAR para continuar:');
      if(conf==='CONFIRMAR'){
        ['cotizaciones','clientes','transacciones','ordenes','proveedores','asientos','recetas','ordenes_produccion','presupuestos','proyectos','pagosProveedores','pagosClientes','productos','config_empresa'].forEach(k=>localStorage.removeItem(`ohs_${k}`));
        localStorage.removeItem('ohs_unidades');
        localStorage.removeItem('ohs_usuarios_extra');
        window.location.reload();
      }
    }
  };

  const tabStyle = (id) => ({padding:'8px 18px',borderRadius:'6px 6px 0 0',cursor:'pointer',fontSize:12,fontWeight:600,border:'none',background:tab===id?'#fff':'#f5f5f5',color:tab===id?'#FF8C00':'#666',borderBottom:tab===id?'3px solid #FF8C00':'3px solid transparent'});
  const COLORS = ['#FF8C00','#3498db','#008000','#8e44ad','#e74c3c','#2c3e50','#16a085','#e67e00'];

  return (
    <div>
      <div style={{display:'flex',gap:2,borderBottom:'2px solid #e8e8e8',marginBottom:20,flexWrap:'wrap'}}>
        {[{id:'usuarios',l:'👥 Usuarios'},{id:'unidades',l:'📐 Unidades de Medida'},{id:'empresa',l:'🏢 Datos de Empresa'},{id:'backup',l:'💾 Backup y Datos'}].map(t=>(
          <button key={t.id} style={tabStyle(t.id)} onClick={()=>setTab(t.id)}>{t.l}</button>
        ))}
      </div>

      {/* ── USUARIOS ── */}
      {tab==='usuarios'&&(
        <div>
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:14}}>
            <button className="btn btn-primary" onClick={()=>{setEditingUser(null);setUserForm({username:'',password:'',nombre:'',role:'admin',color:'#3498db'});setShowUserForm(true)}}><Icon name="plus"/>Nuevo Usuario</button>
          </div>
          {showUserForm&&(
            <div className="card" style={{marginBottom:16,background:'#fffbf0',border:'1px solid #ffe0a0',padding:18}}>
              <h4 style={{fontSize:13,color:'#FF8C00',marginBottom:12}}>{editingUser?'Editar Usuario':'Nuevo Usuario del Sistema'}</h4>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:10}}>
                <div className="form-group"><label className="form-label">Usuario*</label>
                  <input className="form-control" value={userForm.username} onChange={e=>setUserForm(f=>({...f,username:e.target.value.toLowerCase().replace(/\s/g,'')}))} placeholder="usuario123" disabled={!!editingUser}/></div>
                <div className="form-group"><label className="form-label">Contraseña*</label>
                  <input type="password" className="form-control" value={userForm.password} onChange={e=>setUserForm(f=>({...f,password:e.target.value}))} placeholder="••••••"/></div>
                <div className="form-group"><label className="form-label">Nombre*</label>
                  <input className="form-control" value={userForm.nombre} onChange={e=>setUserForm(f=>({...f,nombre:e.target.value}))} placeholder="Nombre visible"/></div>
                <div className="form-group"><label className="form-label">Rol</label>
                  <select className="form-control" value={userForm.role} onChange={e=>setUserForm(f=>({...f,role:e.target.value}))}>
                    <option value="admin">Administrador (acceso completo)</option>
                    <option value="usuario">Usuario (solo lectura)</option>
                  </select>
                </div>
              </div>
              <div className="form-group" style={{marginTop:8}}>
                <label className="form-label">Color de Avatar</label>
                <div style={{display:'flex',gap:8,marginTop:4}}>
                  {COLORS.map(c=><div key={c} onClick={()=>setUserForm(f=>({...f,color:c}))} style={{width:28,height:28,borderRadius:'50%',background:c,cursor:'pointer',border:userForm.color===c?'3px solid #333':'3px solid transparent',transition:'.2s'}}/>)}
                </div>
              </div>
              <div style={{display:'flex',gap:8,marginTop:12}}>
                <button className="btn btn-primary" onClick={saveUser}><Icon name="check"/>Guardar Usuario</button>
                <button className="btn btn-secondary" onClick={()=>{setShowUserForm(false);setEditingUser(null);}}>Cancelar</button>
              </div>
            </div>
          )}
          <div className="card">
            <table>
              <thead><tr><th>Avatar</th><th>Usuario</th><th>Nombre</th><th>Rol</th><th>Tipo</th><th>Acciones</th></tr></thead>
              <tbody>
                {todosUsuarios.map(u=>(
                  <tr key={u.username}>
                    <td><div style={{width:34,height:34,borderRadius:'50%',background:u.color||'#aaa',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontFamily:'Montserrat,sans-serif'}}>{u.nombre.charAt(0)}</div></td>
                    <td><code style={{background:'#f0f0f0',padding:'2px 8px',borderRadius:4}}>{u.username}</code></td>
                    <td><strong>{u.nombre}</strong></td>
                    <td><span style={{background:u.role==='admin'?'#fff3cd':'#f0f0f0',color:u.role==='admin'?'#FF8C00':'#666',borderRadius:20,padding:'3px 10px',fontSize:11,fontWeight:700}}>{u.role==='admin'?'Administrador':'Usuario'}</span></td>
                    <td><span style={{fontSize:11,color:'#aaa'}}>{USERS.find(x=>x.username===u.username)?'Sistema':'Personalizado'}</span></td>
                    <td>
                      {!USERS.find(x=>x.username===u.username)&&<div style={{display:'flex',gap:4}}>
                        <button className="btn btn-sm btn-outline" onClick={()=>{setEditingUser(u);setUserForm({...u});setShowUserForm(true);}}><Icon name="edit" size={12}/></button>
                        <button className="btn btn-sm btn-danger" onClick={()=>{if(window.confirm(`¿Eliminar usuario ${u.username}?`))delUser(u.username)}}><Icon name="trash" size={12}/></button>
                      </div>}
                      {USERS.find(x=>x.username===u.username)&&<span style={{fontSize:11,color:'#aaa'}}>Predeterminado</span>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{marginTop:10,padding:'10px 14px',background:'#f0f8ff',borderRadius:8,fontSize:12,color:'#666',border:'1px solid #bfdbfe'}}>
            💡 Los usuarios de sistema (pmejia, greynoso) se modifican directamente en el código del sistema. Los usuarios personalizados se guardan en el navegador local.
          </div>
        </div>
      )}

      {/* ── UNIDADES DE MEDIDA ── */}
      {tab==='unidades'&&(
        <div>
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:14}}>
            <button className="btn btn-primary" onClick={()=>{setEditingUni(null);setUniForm({nombre:'',abreviatura:'',tipo:'otro'});setShowUniForm(true)}}><Icon name="plus"/>Nueva Unidad</button>
          </div>
          {showUniForm&&(
            <div className="card" style={{marginBottom:16,background:'#fffbf0',border:'1px solid #ffe0a0',padding:18}}>
              <h4 style={{fontSize:13,color:'#FF8C00',marginBottom:12}}>{editingUni?'Editar Unidad':'Nueva Unidad de Medida'}</h4>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
                <div className="form-group"><label className="form-label">Nombre*</label><input className="form-control" value={uniForm.nombre} onChange={e=>setUniForm(f=>({...f,nombre:e.target.value}))} placeholder="Ej: kilogramo"/></div>
                <div className="form-group"><label className="form-label">Abreviatura*</label><input className="form-control" value={uniForm.abreviatura} onChange={e=>setUniForm(f=>({...f,abreviatura:e.target.value}))} placeholder="Ej: kg"/></div>
                <div className="form-group"><label className="form-label">Tipo</label>
                  <select className="form-control" value={uniForm.tipo} onChange={e=>setUniForm(f=>({...f,tipo:e.target.value}))}>
                    {['masa','volumen','longitud','área','tiempo','cantidad','servicio','otro'].map(t=><option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
              </div>
              <div style={{display:'flex',gap:8,marginTop:10}}>
                <button className="btn btn-primary" onClick={saveUni}><Icon name="check"/>Guardar</button>
                <button className="btn btn-secondary" onClick={()=>{setShowUniForm(false);setEditingUni(null);}}>Cancelar</button>
              </div>
            </div>
          )}
          <div className="card">
            <div className="table-wrap">
              <table>
                <thead><tr><th>Nombre</th><th>Abreviatura</th><th>Tipo</th><th>Acciones</th></tr></thead>
                <tbody>
                  {unidades.map((u,i)=>(
                    <tr key={i}>
                      <td><strong>{u.nombre||u}</strong></td>
                      <td><code style={{background:'#f0f0f0',padding:'2px 8px',borderRadius:4}}>{u.abreviatura||u}</code></td>
                      <td><span style={{fontSize:11,background:'#f0f0f0',padding:'2px 8px',borderRadius:10,textTransform:'capitalize'}}>{u.tipo||'otro'}</span></td>
                      <td><div style={{display:'flex',gap:4}}>
                        <button className="btn btn-sm btn-outline" onClick={()=>{setEditingUni(u);setUniForm({nombre:u.nombre||u,abreviatura:u.abreviatura||u,tipo:u.tipo||'otro'});setShowUniForm(true);}}><Icon name="edit" size={12}/></button>
                        <button className="btn btn-sm btn-danger" onClick={()=>delUni(i)}><Icon name="trash" size={12}/></button>
                      </div></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {/* ── DATOS DE EMPRESA ── */}
      {tab==='empresa'&&(
        <div className="card" style={{padding:24,maxWidth:700}}>
          <h3 style={{fontSize:14,marginBottom:20,color:'#1a1a2e',fontFamily:'Montserrat,sans-serif'}}>🏢 Configuración de la Empresa</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <div className="form-group"><label className="form-label">Nombre de la Empresa</label><input className="form-control" value={empForm.nombre} onChange={e=>setEmpForm(f=>({...f,nombre:e.target.value}))}/></div>
            <div className="form-group"><label className="form-label">NIT</label><input className="form-control" value={empForm.nit} onChange={e=>setEmpForm(f=>({...f,nit:e.target.value}))} placeholder="CF o NIT"/></div>
            <div className="form-group"><label className="form-label">Dirección</label><input className="form-control" value={empForm.direccion} onChange={e=>setEmpForm(f=>({...f,direccion:e.target.value}))}/></div>
            <div className="form-group"><label className="form-label">Teléfono</label><input className="form-control" value={empForm.telefono} onChange={e=>setEmpForm(f=>({...f,telefono:e.target.value}))}/></div>
            <div className="form-group"><label className="form-label">Correo</label><input type="email" className="form-control" value={empForm.email} onChange={e=>setEmpForm(f=>({...f,email:e.target.value}))}/></div>
            <div className="form-group"><label className="form-label">Sitio Web</label><input className="form-control" value={empForm.web} onChange={e=>setEmpForm(f=>({...f,web:e.target.value}))}/></div>
            <div className="form-group"><label className="form-label">Régimen Fiscal</label>
              <select className="form-control" value={empForm.regimen} onChange={e=>setEmpForm(f=>({...f,regimen:e.target.value}))}>
                <option>Pequeño Contribuyente</option><option>Régimen General IVA</option><option>SAT ISR Opcional Simplificado</option>
              </select>
            </div>
            <div className="form-group"><label className="form-label">Moneda</label>
              <select className="form-control" value={empForm.moneda} onChange={e=>setEmpForm(f=>({...f,moneda:e.target.value}))}>
                <option value="Q">Quetzal (Q)</option><option value="$">Dólar ($)</option>
              </select>
            </div>
          </div>
          <button className="btn btn-primary" style={{marginTop:16}} onClick={saveEmpresa}><Icon name="check"/>Guardar Configuración</button>
        </div>
      )}

      {/* ── BACKUP Y DATOS ── */}
      {tab==='backup'&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <div className="card" style={{padding:24}}>
            <h3 style={{fontSize:14,marginBottom:16,color:'#1a1a2e',fontFamily:'Montserrat,sans-serif'}}>💾 Exportar Backup</h3>
            <p style={{fontSize:13,color:'#666',marginBottom:16,lineHeight:1.6}}>
              Descarga un archivo JSON con todos tus datos: cotizaciones, facturas, clientes, inventario, contabilidad y más.<br/>
              <strong style={{color:'#c0392b'}}>Guarda este archivo regularmente para no perder información si limpias el navegador.</strong>
            </p>
            <button className="btn btn-primary" onClick={exportData}>⬇️ Descargar Backup JSON</button>
          </div>
          <div className="card" style={{padding:24}}>
            <h3 style={{fontSize:14,marginBottom:16,color:'#1a1a2e',fontFamily:'Montserrat,sans-serif'}}>📂 Importar Backup</h3>
            <p style={{fontSize:13,color:'#666',marginBottom:16,lineHeight:1.6}}>
              Restaura datos desde un backup JSON previamente exportado. <strong style={{color:'#c0392b'}}>Esto sobreescribirá todos los datos actuales.</strong>
            </p>
            <label className="btn btn-secondary" style={{cursor:'pointer'}}>
              ⬆️ Seleccionar Archivo JSON
              <input type="file" accept=".json" style={{display:'none'}} onChange={importData}/>
            </label>
          </div>
          <div className="card" style={{padding:24,borderColor:'#fee2e2'}}>
            <h3 style={{fontSize:14,marginBottom:16,color:'#c0392b',fontFamily:'Montserrat,sans-serif'}}>⚠️ Zona de Peligro</h3>
            <p style={{fontSize:13,color:'#666',marginBottom:16,lineHeight:1.6}}>
              Elimina todos los datos del sistema. Esta acción es <strong>permanente e irreversible</strong>. Haz un backup antes.
            </p>
            <button className="btn" style={{background:'#fee2e2',color:'#c0392b',border:'1px solid #fca5a5'}} onClick={clearData}>🗑️ Eliminar Todos los Datos</button>
          </div>
          <div className="card" style={{padding:24}}>
            <h3 style={{fontSize:14,marginBottom:12,color:'#1a1a2e',fontFamily:'Montserrat,sans-serif'}}>📊 Estado del Almacenamiento</h3>
            {['cotizaciones','clientes','transacciones','ordenes','proveedores','asientos','productos','presupuestos','proyectos'].map(k=>{
              const data = state[k]||[];
              return <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid #f5f5f5',fontSize:12}}>
                <span style={{color:'#555',textTransform:'capitalize'}}>{k}</span>
                <strong>{Array.isArray(data)?data.length:'—'} registros</strong>
              </div>;
            })}
          </div>
        </div>
      )}
    </div>
  );
};

const App = () => {
  // Merge: respeta 100% los datos guardados, solo agrega productos nuevos del catálogo base
  const normNombre = (n) => (n||'').trim().toLowerCase().replace(/\s+/g,' ');
  const mergeProductos = () => {
    const saved = load('productos', null);
    if (!saved || saved.length === 0) return INITIAL_PRODUCTOS;
    const savedIds = new Set(saved.map(p=>p.id));
    const savedNombres = new Set(saved.map(p=>normNombre(p.nombre)));
    // No agregar si ya existe por ID ni por nombre (evita duplicados al actualizar)
    const nuevos = INITIAL_PRODUCTOS.filter(p=>
      !savedIds.has(p.id) && !savedNombres.has(normNombre(p.nombre))
    );
    return nuevos.length > 0 ? [...saved, ...nuevos] : saved;
  };
  const initialState = {
    productos: mergeProductos(),
    cotizaciones: load('cotizaciones', INITIAL_COTIZACIONES),
    clientes: load('clientes', []),
    transacciones: load('transacciones', []),
    ordenes: load('ordenes', []),
    proveedores: load('proveedores', []),
    asientos: load('asientos', []),
    recetas: load('recetas', INITIAL_RECETAS),
    ordenes_produccion: load('ordenes_produccion', []),
    presupuestos: load('presupuestos', []),
    proyectos: load('proyectos', []),
    pagosClientes: load('pagosClientes', []),
    pagosProveedores: load('pagosProveedores', []),
    config_empresa: load('config_empresa', null),
  };
  const [state,dispatch] = useReducer(reducer,initialState);
  const [mod,setMod] = useState('dashboard');
  const [dbReady,setDbReady] = useState(false);
  const [dbError,setDbError] = useState(false);
  useEffect(()=>{
    const fetchAll=async()=>{
      // PASO 1: Mostrar localStorage INMEDIATAMENTE (sin esperar Supabase)
      // Así el usuario ve sus datos al instante aunque Supabase tarde
      const localKeys=['cotizaciones','clientes','transacciones','ordenes','proveedores',
        'asientos','recetas','ordenes_produccion','presupuestos','proyectos',
        'pagosClientes','pagosProveedores'];
      const localPayload={};
      localKeys.forEach(k=>{
        const v=load(k,null);
        if(v && v.length>0) localPayload[k]=v;
      });
      const localCfg=load('config_empresa',null);
      if(localCfg) localPayload.config_empresa=localCfg;
      // Productos: localStorage primero
      const localProductos=load('productos',null);
      if(localProductos && localProductos.length>0) localPayload.productos=localProductos;
      else localPayload.productos=INITIAL_PRODUCTOS;

      if(Object.keys(localPayload).length>0){
        dispatch({type:'IMPORT_DATA',payload:localPayload});
      }
      // Mostrar UI inmediatamente con datos locales
      setDbReady(true);

      // PASO 2: Cargar Supabase en background y hacer merge
      try{
        const keys=['cotizaciones','productos','clientes','transacciones','ordenes','proveedores',
          'asientos','recetas','ordenes_produccion','presupuestos','proyectos',
          'pagosClientes','pagosProveedores','unidades'];
        const results=await Promise.all(keys.map(k=>dbLoad(k)));
        const cfg=await dbLoad('config_empresa');
        const dbPayload={};
        keys.forEach((k,i)=>{if(results[i]!==null && results[i].length>0)dbPayload[k]=results[i];});
        if(cfg!==null)dbPayload.config_empresa=cfg;

        // Productos: Supabase es fuente de verdad, pero solo si tiene datos
        const dbProductos = dbPayload.productos || [];
        if(dbProductos.length === 0){
          // Supabase vacío: sembrar con los del HTML
          dbPayload.productos = INITIAL_PRODUCTOS;
          // Sembrar productos solo una vez, en batch con delay
          setTimeout(()=>{
            const batch = INITIAL_PRODUCTOS;
            const uploadBatch = async () => {
              for(let i=0; i<batch.length; i+=10){
                await Promise.all(batch.slice(i,i+10).map(p=>dbUpsert('productos',p)));
                await new Promise(r=>setTimeout(r,200));
              }
            };
            uploadBatch().catch(e=>console.warn('Seed productos error:',e));
          }, 1000);
        } else {
          // Agregar solo IDs nuevos que no estén en Supabase
          const dbIds = new Set(dbProductos.map(p=>p.id));
          const soloNuevos = INITIAL_PRODUCTOS.filter(p=>!dbIds.has(p.id));
          if(soloNuevos.length>0){
            dbPayload.productos=[...dbProductos,...soloNuevos];
            Promise.all(soloNuevos.map(p=>dbUpsert('productos',p)));
          }
        }

        // Merge: Supabase gana sobre localStorage para colecciones que tiene datos
        // localStorage gana para colecciones que Supabase no tiene aún
        const mergedPayload={};
        keys.forEach((k,i)=>{
          const dbData = dbPayload[k];
          const localData = localPayload[k];
          if(dbData && dbData.length>0){
            // Supabase tiene datos: usar Supabase
            // Pero agregar registros locales que Supabase no conoce aún (creados offline)
            if(localData && localData.length>0){
              const dbIds = new Set(dbData.map(r=>r.id));
              const soloLocal = localData.filter(r=>!dbIds.has(r.id));
              if(soloLocal.length>0){
                mergedPayload[k]=[...dbData,...soloLocal];
                // Subir registros locales a Supabase
                // Upload offline records to Supabase (solo los que no tiene)
              setTimeout(()=>Promise.all(soloLocal.map(r=>dbUpsert(k,r))),500);
              } else {
                mergedPayload[k]=dbData;
              }
            } else {
              mergedPayload[k]=dbData;
            }
          } else if(localData && localData.length>0){
            // Supabase vacío pero hay datos locales: usar local y subir a Supabase
            mergedPayload[k]=localData;
            setTimeout(()=>Promise.all(localData.map(r=>dbUpsert(k,r))),500);
          }
        });
        if(dbPayload.config_empresa) mergedPayload.config_empresa=dbPayload.config_empresa;

        if(Object.keys(mergedPayload).length>0){
          dispatch({type:'IMPORT_DATA',payload:mergedPayload});
        }
        setDbError(false);
      }catch(e){
        console.warn('Supabase sync failed, running on localStorage only:',e);
        setDbError(true);
      }
    };
    fetchAll();
  },[]);
  useEffect(()=>{
    if(!dbReady)return;
    const channels=[];
    const reloadTable=async(k)=>{const data=await dbLoad(k);if(data!==null){dispatch({type:'IMPORT_DATA',payload:{[k]:data}});save(k,data);}};
    ['cotizaciones','clientes','ordenes','productos','transacciones','proveedores','presupuestos','proyectos'].forEach(k=>{
      const ch=sb.channel('ohs_rt_'+k).on('postgres_changes',{event:'*',schema:'public',table:DB_TABLES[k]},()=>reloadTable(k)).subscribe();
      channels.push(ch);
    });
    return()=>channels.forEach(ch=>sb.removeChannel(ch));
  },[dbReady]);
  const [currentUser, setCurrentUser] = useState(null);

  const canEdit = currentUser?.role === 'admin';
  const logout = () => setCurrentUser(null);

  if (!currentUser) return <LoginScreen onLogin={setCurrentUser}/>;
  if(!dbReady) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,background:'#f8f9fa'}}>
      <div style={{width:48,height:48,border:'4px solid #e9ecef',borderTop:'4px solid #FF8C00',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
      <p style={{color:'#666',fontFamily:'Montserrat,sans-serif',fontSize:14}}>{dbError?'Sin conexión — cargando caché local...':'Conectando con base de datos...'}</p>
      <style>{'@keyframes spin{to{transform:rotate(360deg)}}'}</style>
    </div>
  );

  const modTitles = {dashboard:'Dashboard',reportes:'Reportes y Análisis',presupuestos:'Presupuestos',proyectos:'Gestión de Proyectos',cotizaciones:'Cotizaciones',clientes:'Clientes — CRM',inventario:'Inventario y Catálogo',finanzas:'Finanzas y Contabilidad',produccion:'Producción — Recetas y BOM',compras:'Compras — Proveedores y Facturas',ventas:'Ventas — Facturas y Cobros',contabilidad:'Contabilidad — Plan de Cuentas y Estados Financieros',admin:'Configuración del Sistema'};
  const sections = ['principal','comercial','operaciones','admin'];
  const sectionLabel = {principal:'Principal',comercial:'Comercial',operaciones:'Operaciones',admin:'Sistema'};

  return (
  <AuthContext.Provider value={{canEdit, user:currentUser, logout}}>
    <div>
      {/* SIDEBAR */}
      <nav className="sidebar">
        <div className="sidebar-logo">
          <h2>OHS Training GT</h2>
          <span>Sistema ERP · v1.0</span>
        </div>
        <div className="sidebar-nav">
          {sections.map(sec=>(
            <div key={sec}>
              <div className="nav-section">{sectionLabel[sec]}</div>
              {MODULES.filter(m=>m.section===sec).map(m=>(
                <div key={m.id} className={`nav-item${mod===m.id?' active':''}`} onClick={()=>setMod(m.id)}>
                  <Icon name={m.icon} size={18}/><span>{m.label}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
        <div style={{padding:'12px 16px',borderTop:'1px solid rgba(255,255,255,.1)',fontSize:11,color:'#666'}}>
          OHS Training GT © 2026<br/>
          <span style={{color:'#FF8C00'}}>info@ohstraining.com</span>
        </div>
      </nav>
      {/* MAIN */}
      <main className="main">
        <div className="topbar">
          <div className="topbar-title">{modTitles[mod]}</div>
          <div className="topbar-right">
            <span className="badge badge-orange">OHS Training GT</span>
            <span style={{fontSize:12,color:'#aaa'}}>{new Date().toLocaleDateString('es-GT',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</span>
            <div style={{display:'flex',alignItems:'center',gap:8,background:'#f8f9fa',borderRadius:20,padding:'5px 12px 5px 8px',border:'1px solid #e2e8f0'}}>
              <div style={{width:28,height:28,borderRadius:'50%',background:currentUser.color,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:13,fontFamily:'Montserrat,sans-serif'}}>
                {currentUser.nombre.charAt(0)}
              </div>
              <div style={{lineHeight:1.3}}>
                <div style={{fontSize:12,fontWeight:700,color:'#333',fontFamily:'Montserrat,sans-serif'}}>{currentUser.nombre}</div>
              </div>
              <button onClick={logout} title="Cerrar sesión"
                style={{background:'none',border:'1px solid #ddd',borderRadius:6,padding:'3px 8px',fontSize:11,cursor:'pointer',color:'#888',marginLeft:4,transition:'.2s'}}
                onMouseEnter={e=>e.currentTarget.style.background='#fee2e2'} onMouseLeave={e=>e.currentTarget.style.background='none'}>
                ⏻
              </button>
            </div>
          </div>
        </div>
        <div className="content">
          {mod==='dashboard'   && <Dashboard   state={state}/>}
          {mod==='reportes'    && <Reportes    state={state}/>}
          {mod==='cotizaciones'&& <Cotizaciones state={state} dispatch={dispatch}/>}
          {mod==='clientes'    && <Clientes     state={state} dispatch={dispatch}/>}
          {mod==='inventario'  && <Inventario   state={state} dispatch={dispatch}/>}
          {mod==='finanzas'    && <Finanzas     state={state} dispatch={dispatch}/>}
          {mod==='produccion'  && <Produccion state={state} dispatch={dispatch}/>}
          {mod==='compras'       && <Compras       state={state} dispatch={dispatch}/>}
          {mod==='ventas'        && <Ventas        state={state} dispatch={dispatch}/>}
          {mod==='contabilidad'  && <Contabilidad  state={state} dispatch={dispatch}/>}
          {mod==='presupuestos'   && <Presupuestos   state={state} dispatch={dispatch}/>}
          {mod==='proyectos'      && <Proyectos      state={state} dispatch={dispatch}/>}
          {mod==='admin'          && <AdminConfig    state={state} dispatch={dispatch}/>}
        </div>
      </main>
    </div>
  </AuthContext.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
