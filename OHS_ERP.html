                    const stC={pendiente:'#FF8C00',recibido:'#008000',cancelado:'#c0392b'};
                    return <tr key={f.id} style={{borderBottom:'1px solid #f5f5f5'}}>
                      <td style={{padding:'6px 10px'}}>{f.fecha}</td>
                      <td style={{padding:'6px 10px',fontWeight:600}}>{f.proveedorNombre||f.proveedor||'—'}</td>
                      <td style={{padding:'6px 10px',color:'#3498db'}}>{f.numeroFactura||'—'}</td>
                      <td style={{padding:'6px 10px',textAlign:'right'}}>{fmtQ(f.subtotal||f.total||0)}</td>
                      <td style={{padding:'6px 10px',textAlign:'right',color:'#888'}}>{f.ivaAmt>0?fmtQ(f.ivaAmt):'—'}</td>
                      <td style={{padding:'6px 10px',textAlign:'right',fontWeight:700,color:'#c0392b'}}>{fmtQ(f.total)}</td>
                      <td style={{padding:'6px 10px',textAlign:'center'}}><span style={{background:stC[f.estado]||'#aaa',color:'#fff',borderRadius:4,padding:'2px 7px',fontSize:10,fontWeight:700}}>{f.estado}</span></td>
                    </tr>;
                  })}
                </tbody>
              </table>
            </div>}
          </div>
        </div>;
      })()}

      {/* ══════ TAB: FACTURAS DE VENTA ══════ */}
      {tab==='fventas'&&(()=>{
        const facVent = state.ordenes.filter(o=>o.tipo==='venta' && getAnio(o.fecha)===anioSel);
        const totalVent = facVent.reduce((s,f)=>s+f.total,0);
        const pagadas = facVent.filter(f=>f.estado==='pagada').length;
        const ventMes=Array(12).fill(0);
        facVent.forEach(f=>{const m=getMes(f.fecha);if(m>=0)ventMes[m]+=f.total;});
        const maxVentMes=Math.max(...ventMes,1);
        const cliMap={};
        facVent.forEach(f=>{const k=f.clienteNombre||'Sin cliente';cliMap[k]=(cliMap[k]||0)+f.total;});
        const topCli=Object.entries(cliMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
        return <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:22}}>
            <StatCard2 label="FACTURAS DE VENTA" value={facVent.length} sub={`en ${anioSel}`} color="#008000" icon="🧾"/>
            <StatCard2 label="TOTAL FACTURADO" value={fmtQ(totalVent)} sub={`${pagadas} pagadas`} color="#008000" icon="💰"/>
            <StatCard2 label="TASA DE COBRO" value={facVent.length>0?`${(pagadas/facVent.length*100).toFixed(0)}%`:'—'} sub="pagadas/emitidas" color={facVent.length>0&&pagadas/facVent.length>=0.7?'#1a7a1a':'#e67e00'} icon="✅"/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
            <div style={{background:'#fff',border:'1px solid var(--border)',borderRadius:10,padding:16}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:12}}>Ventas por Mes — {anioSel}</div>
              <div style={{display:'flex',gap:4,alignItems:'flex-end',height:100}}>
                {MESES.map((m,i)=>(
                  <div key={m} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                    <div style={{width:'70%',background:'#008000',borderRadius:'3px 3px 0 0',height:`${(ventMes[i]/maxVentMes)*80}px`,minHeight:ventMes[i]>0?2:0}} title={fmtQ(ventMes[i])}/>
                    <div style={{fontSize:9,color:'#999'}}>{m}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{background:'#fff',border:'1px solid var(--border)',borderRadius:10,padding:16}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:12}}>Top Clientes por Monto Facturado</div>
              {topCli.length===0?<p style={{color:'#aaa',fontSize:12}}>Sin datos</p>:
              topCli.map(([n,v])=>(
                <div key={n} style={{marginBottom:8}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}><span>{n}</span><strong style={{color:'#008000'}}>{fmtQ(v)}</strong></div>
                  <MiniBar value={v} max={topCli[0][1]} color="#008000"/>
                </div>
              ))}
            </div>
          </div>
          <div style={{background:'#fff',border:'1px solid var(--border)',borderRadius:10,padding:16}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:12}}>Historial de Facturas de Venta — {anioSel}</div>
            {facVent.length===0?<p style={{color:'#aaa',fontSize:12}}>Sin facturas de venta en {anioSel}</p>:
            <div style={{overflowX:'auto'}}>
              <table style={{fontSize:12,width:'100%'}}>
                <thead><tr style={{background:'#f8f9fa'}}>
                  <th style={{padding:'7px 10px',textAlign:'left'}}>Fecha</th>
                  <th style={{padding:'7px 10px',textAlign:'left'}}>Cliente</th>
                  <th style={{padding:'7px 10px',textAlign:'left'}}>N° Factura</th>
                  <th style={{padding:'7px 10px',textAlign:'left'}}>Cot. Ref.</th>
                  <th style={{padding:'7px 10px',textAlign:'right'}}>Base</th>
                  <th style={{padding:'7px 10px',textAlign:'right'}}>IVA</th>
                  <th style={{padding:'7px 10px',textAlign:'right'}}>Total</th>
                  <th style={{padding:'7px 10px',textAlign:'center'}}>Estado</th>
                </tr></thead>
                <tbody>
                  {[...facVent].sort((a,b)=>b.fecha?.localeCompare(a.fecha)).map(f=>{
                    const stC={emitida:'#3498db',pagada:'#008000',anulada:'#c0392b'};
                    return <tr key={f.id} style={{borderBottom:'1px solid #f5f5f5'}}>
                      <td style={{padding:'6px 10px'}}>{f.fecha}</td>
                      <td style={{padding:'6px 10px',fontWeight:600}}>{f.clienteNombre||'—'}</td>
                      <td style={{padding:'6px 10px',color:'#008000'}}>{f.numeroFactura||'—'}</td>
                      <td style={{padding:'6px 10px',color:'#888'}}>{f.cotizacionRef||'—'}</td>
                      <td style={{padding:'6px 10px',textAlign:'right'}}>{fmtQ(f.baseAmt||f.total||0)}</td>
                      <td style={{padding:'6px 10px',textAlign:'right',color:'#888'}}>{f.ivaAmt>0?fmtQ(f.ivaAmt):'—'}</td>
                      <td style={{padding:'6px 10px',textAlign:'right',fontWeight:700,color:'#008000'}}>{fmtQ(f.total)}</td>
                      <td style={{padding:'6px 10px',textAlign:'center'}}><span style={{background:stC[f.estado]||'#aaa',color:'#fff',borderRadius:4,padding:'2px 7px',fontSize:10,fontWeight:700}}>{f.estado}</span></td>
                    </tr>;
                  })}
                </tbody>
              </table>
            </div>}
          </div>
        </div>;
      })()}

      {/* ══════ TAB: RESUMEN CONTABLE ══════ */}
      {tab==='contab'&&(()=>{
        const asientos = state.asientos||[];
        const saldosR = {};
        PLAN_CUENTAS.filter(c=>c.tipo==='cuenta').forEach(c=>{saldosR[c.id]={debe:0,haber:0};});
        asientos.forEach(a=>{
          a.partidas?.forEach(p=>{
            if(!saldosR[p.cuentaId]) saldosR[p.cuentaId]={debe:0,haber:0};
            saldosR[p.cuentaId].debe+=p.debe||0;
            saldosR[p.cuentaId].haber+=p.haber||0;
          });
        });
        const gns=(id)=>{
          const s=saldosR[id]||{debe:0,haber:0};
          const c=cuentaById(id);
          return c?.normal==='deudora'?s.debe-s.haber:s.haber-s.debe;
        };
        // PC: sin cuentas IGSS (6.1.01-6.1.04 removidas), solo gastos operativos válidos
        const tIngr=['4.1.01','4.1.02','4.1.03','4.2.01'].reduce((s,id)=>s+gns(id),0);
        const tCost=['5.1.01','5.1.02','5.1.03'].reduce((s,id)=>s+gns(id),0);
        const tGast=['6.1.05','6.1.06','6.1.07','6.1.08','6.1.09','6.2.01','6.2.02','6.2.03','6.3.01'].reduce((s,id)=>s+gns(id),0);
        // PC: IVA = 5% sobre ingresos brutos (Art.45 bis Dto.27-92) — no débito/crédito
        const ivaPC = parseFloat((tIngr * REGIMEN.ivaRate).toFixed(2));
        const utilAntesISR = tIngr - tCost - tGast - ivaPC;
        // ISR Régimen Simplificado (cuenta 6.4.02)
        const isrPC = gns('6.4.02');
        const utilNeta = utilAntesISR - isrPC;
        // IVA PC por pagar registrado contablemente (cuenta 2.1.02)
        const ivaContable = gns('2.1.02');
        const activoC=['1.1.01','1.1.02','1.1.03','1.1.04','1.1.05','1.1.06','1.1.07','1.1.08'].reduce((s,id)=>s+gns(id),0);
        // PC: pasivo corriente solo incluye ctas válidas (sin IGSS 2.1.04-2.1.07)
        const pasivoC=['2.1.01','2.1.02','2.1.03','2.1.08','2.1.09'].reduce((s,id)=>s+gns(id),0);
        // ISR estimado según tramos PC: 5% hasta Q30,000 · 7% exceso
        const isrEstimado = tIngr<=REGIMEN.isrTramoCielo
          ? parseFloat((tIngr*REGIMEN.isrRateBajo).toFixed(2))
          : parseFloat((REGIMEN.isrTramoCielo*REGIMEN.isrRateBajo+(tIngr-REGIMEN.isrTramoCielo)*REGIMEN.isrRateAlto).toFixed(2));
        const R2=({label,value,color,bold,indent})=>(
          <div style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid #f5f5f5',fontSize:12,fontWeight:bold?700:400,paddingLeft:indent?12:0}}>
            <span style={{color:indent?'#555':'inherit'}}>{label}</span><span style={{color:color||'#333'}}>{value}</span>
          </div>
        );
        return <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:22}}>
            <StatCard2 label="ASIENTOS REGISTRADOS" value={asientos.length} sub="en libro diario" color="#FF8C00" icon="📔"/>
            <StatCard2 label="INGRESOS TOTALES" value={fmtQ(tIngr)} sub="cuentas 4.x" color="#008000" icon="📈"/>
            <StatCard2 label="UTILIDAD NETA" value={fmtQ(utilNeta)} sub="después de ISR" color={utilNeta>=0?'#1a7a1a':'#c0392b'} icon="💵"/>
            <StatCard2 label="IVA PC A PAGAR" value={fmtQ(ivaPC)} sub="5% s/ingresos brutos" color="#c0392b" icon="🧾"/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:16}}>
            <div style={{background:'#fff',border:'1px solid var(--border)',borderRadius:10,padding:16}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:'#1a1a2e',borderBottom:'2px solid #FF8C00',paddingBottom:6}}>Estado de Resultados — PC</div>
              <R2 label="Ingresos totales" value={fmtQ(tIngr)} color="#008000" bold/>
              <R2 label="(-) Costos de ventas/prod." value={`(${fmtQ(tCost)})`} color="#c0392b" indent/>
              <R2 label="Utilidad bruta" value={fmtQ(tIngr-tCost)} color={(tIngr-tCost)>=0?'#1a4fa0':'#c0392b'} bold/>
              <R2 label="(-) Gastos de operación" value={`(${fmtQ(tGast)})`} color="#c0392b" indent/>
              <R2 label="(-) IVA PC 5% s/ingresos brutos" value={`(${fmtQ(ivaPC)})`} color="#c0392b" indent/>
              <R2 label="Utilidad antes de ISR" value={fmtQ(utilAntesISR)} color={utilAntesISR>=0?'#1a4fa0':'#c0392b'} bold/>
              <R2 label="(-) ISR Simplificado (5%/7%)" value={`(${fmtQ(isrPC)})`} color="#c0392b" indent/>
              <R2 label="UTILIDAD NETA" value={fmtQ(utilNeta)} color={utilNeta>=0?'#1a7a1a':'#c0392b'} bold/>
            </div>
            <div style={{background:'#fff',border:'1px solid var(--border)',borderRadius:10,padding:16}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:'#1a1a2e',borderBottom:'2px solid #3498db',paddingBottom:6}}>Posición Financiera</div>
              <R2 label="Activo Corriente" value={fmtQ(activoC)} color="#3498db" bold/>
              <R2 label="  · Caja + Bancos" value={fmtQ(gns('1.1.01')+gns('1.1.02'))} indent/>
              <R2 label="  · Cuentas por Cobrar" value={fmtQ(gns('1.1.03'))} indent/>
              <R2 label="  · Inventarios" value={fmtQ(gns('1.1.05')+gns('1.1.06')+gns('1.1.07'))} indent/>
              <R2 label="  · Pagos Anticipados" value={fmtQ(gns('1.1.04'))} indent/>
              <R2 label="Pasivo Corriente" value={fmtQ(pasivoC)} color="#e74c3c" bold/>
              <R2 label="  · Cuentas por Pagar" value={fmtQ(gns('2.1.01'))} indent/>
              <R2 label="  · IVA PC por Pagar" value={fmtQ(gns('2.1.02'))} indent/>
              <R2 label="  · ISR por Pagar" value={fmtQ(gns('2.1.03'))} indent/>
              <R2 label="Capital de Trabajo" value={fmtQ(activoC-pasivoC)} color={(activoC-pasivoC)>=0?'#1a7a1a':'#c0392b'} bold/>
            </div>
            <div style={{background:'#fff',border:'1px solid var(--border)',borderRadius:10,padding:16}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:'#1a1a2e',borderBottom:'2px solid #8e44ad',paddingBottom:6}}>IVA PC — Declaración SAT</div>
              <R2 label="Base imponible (ingresos brutos)" value={fmtQ(tIngr)} color="#333" bold/>
              <R2 label="IVA calculado (5%)" value={fmtQ(ivaPC)} color="#c0392b" bold/>
              <R2 label="IVA contabilizado (cta 2.1.02)" value={fmtQ(ivaContable)} color="#8e44ad"/>
              <div style={{borderTop:'2px solid #8e44ad',marginTop:8,paddingTop:8}}>
                <R2 label="ISR estimado (tramos 5%/7%)" value={fmtQ(isrEstimado)} color="#c0392b" bold/>
                <R2 label="ISR registrado (cta 6.4.02)" value={fmtQ(isrPC)} color="#8e44ad"/>
              </div>
              <div style={{marginTop:12,fontSize:11,color:'#888',lineHeight:1.8,background:'#fafafa',padding:'8px',borderRadius:6}}>
                <strong style={{color:'#555'}}>Régimen:</strong> {REGIMEN.nombre}<br/>
                <strong style={{color:'#555'}}>IVA:</strong> {REGIMEN.declaracionIVA}<br/>
                <strong style={{color:'#555'}}>ISR:</strong> {REGIMEN.declaracionISR}<br/>
                <strong style={{color:'#555'}}>Base legal:</strong> Dto.27-92 Art.45 bis · Dto.10-2012
              </div>
            </div>
          </div>
        </div>;
      })()}
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════
   CONTABILIDAD — PLAN DE CUENTAS (Guatemala)
   Régimen: PEQUEÑO CONTRIBUYENTE (Dto.27-92 Art.45 bis)
   Base legal: Código de Comercio Dto.2-70
               Ley del IVA Dto.27-92 (PC: 5% sobre ventas brutas)
               Ley del ISR Dto.10-2012 (Régimen Simplificado Opcional:
                 5% ingresos ≤ Q30,000/mes · 7% sobre el exceso)
               NIIF para PyMEs adoptadas por SAT GT
   Nota: Sin planilla IGSS (sin empleados)
═══════════════════════════════════════════════════════════ */

  {id:'1.1.05',codigo:'1.1.05',nombre:'Inventario de Mercaderías',tipo:'cuenta',clase:'activo',normal:'deudora',nivel:3,nota:'Incluye el IVA de compras como parte del costo'},
  {id:'1.1.06',codigo:'1.1.06',nombre:'Inventario de Materia Prima',tipo:'cuenta',clase:'activo',normal:'deudora',nivel:3},

  {id:'1.2',codigo:'1.2',nombre:'ACTIVO NO CORRIENTE',tipo:'titulo',clase:'activo',nivel:2},

  {id:'1.2.02',codigo:'1.2.02',nombre:'Depreciación Acumulada',tipo:'cuenta',clase:'activo',normal:'acreedora',nivel:3},
  // ── PASIVO ──
  {id:'2',codigo:'2',nombre:'PASIVO',tipo:'titulo',clase:'pasivo',nivel:1},
  {id:'2.1',codigo:'2.1',nombre:'PASIVO CORRIENTE',tipo:'titulo',clase:'pasivo',nivel:2},
  {id:'2.1.01',codigo:'2.1.01',nombre:'Cuentas por Pagar — Proveedores',tipo:'cuenta',clase:'pasivo',normal:'acreedora',nivel:3},
  {id:'2.1.02',codigo:'2.1.02',nombre:'IVA Pequeño Contribuyente por Pagar (5%)',tipo:'cuenta',clase:'pasivo',normal:'acreedora',nivel:3,nota:'5% sobre ingresos brutos — Dto.27-92 Art.45 bis'},

  {id:'2.1.08',codigo:'2.1.08',nombre:'Documentos por Pagar',tipo:'cuenta',clase:'pasivo',normal:'acreedora',nivel:3},
  {id:'2.1.09',codigo:'2.1.09',nombre:'Otros Pasivos Corrientes',tipo:'cuenta',clase:'pasivo',normal:'acreedora',nivel:3},

const cuentaById = (id) => PLAN_CUENTAS.find(c=>c.id===id)||{codigo:id,nombre:id};

// Helper: crea partidas para un asiento
const mkAsiento = (id, fecha, descripcion, origen, referencia, partidas) => ({
  id, fecha, descripcion, origen, referencia,
  partidas: partidas.map(p=>({
    cuentaId:p[0], cuentaCodigo:cuentaById(p[0]).codigo,
    cuentaNombre:cuentaById(p[0]).nombre,
    debe:p[1]||0, haber:p[2]||0,
  })),
});

const Contabilidad = ({state,dispatch}) => {
  const [tab,setTab] = useState('plan');
  const [showForm,setShowForm] = useState(false);
  const asientos = state.asientos || [];
  const {canEdit} = React.useContext(AuthContext);

  // ── Balance de comprobación ──
  const saldos = {};
  PLAN_CUENTAS.filter(c=>c.tipo==='cuenta').forEach(c=>{saldos[c.id]={debe:0,haber:0};});
  asientos.forEach(a=>{
    a.partidas?.forEach(p=>{
      if(!saldos[p.cuentaId]) saldos[p.cuentaId]={debe:0,haber:0};
      saldos[p.cuentaId].debe+=p.debe||0;
      saldos[p.cuentaId].haber+=p.haber||0;
    });
  });
  const totalDebe  = Object.values(saldos).reduce((s,v)=>s+v.debe,0);
  const totalHaber = Object.values(saldos).reduce((s,v)=>s+v.haber,0);

  // ── Estado de Resultados ──
  const getNetSaldo = (cuentaId) => {
    const s = saldos[cuentaId]||{debe:0,haber:0};
    const c = cuentaById(cuentaId);
    return c.normal==='deudora' ? s.debe-s.haber : s.haber-s.debe;
  };
  const totalIngresos = ['4.1.01','4.1.02','4.1.03','4.2.01'].reduce((s,id)=>s+getNetSaldo(id),0);
  const totalCostos   = ['5.1.01','5.1.02','5.1.03'].reduce((s,id)=>s+getNetSaldo(id),0);
  const utilBruta     = totalIngresos - totalCostos;
  const gastosOp      = ['6.1.05','6.1.06','6.1.07','6.1.08','6.1.09',
                          '6.2.01','6.2.02','6.2.03','6.3.01'].reduce((s,id)=>s+getNetSaldo(id),0);
  // PC: IVA = 5% sobre ingresos brutos totales (Dto.27-92 Art.45 bis)
  const ivaPC         = parseFloat((totalIngresos * REGIMEN.ivaRate).toFixed(2));
  const utilAntesISR  = utilBruta - gastosOp - ivaPC;
  // PC: ISR Simplificado — 5% hasta Q30,000/mes · 7% sobre el exceso (anualizado simplificado)
  const isrRegistrado = getNetSaldo('6.4.02');
  const utilNeta      = utilAntesISR - isrRegistrado;

  // ── Balance General ──
  const activoCorriente  = ['1.1.01','1.1.02','1.1.03','1.1.04','1.1.05','1.1.06','1.1.07','1.1.08'].reduce((s,id)=>s+getNetSaldo(id),0);
  const activoNoCorriente= ['1.2.01'].reduce((s,id)=>s+getNetSaldo(id),0) - Math.abs(getNetSaldo('1.2.02'));
  const totalActivo      = activoCorriente + activoNoCorriente;
  const pasivoCorriente  = ['2.1.01','2.1.02','2.1.03','2.1.08','2.1.09'].reduce((s,id)=>s+getNetSaldo(id),0);
  const pasivoNoCorriente= ['2.2.01'].reduce((s,id)=>s+getNetSaldo(id),0);
  const totalPasivo      = pasivoCorriente + pasivoNoCorriente;
  const capital          = ['3.1.01','3.1.02'].reduce((s,id)=>s+getNetSaldo(id),0) - getNetSaldo('3.1.03') + utilNeta;
  const totalPasCap      = totalPasivo + capital;

  // ── Asiento manual form ──

  const addPartida=()=>setNewA(a=>({...a,partidas:[...a.partidas,{cuentaId:'',debe:0,haber:0}]}));
  const updPartida=(i,k,v)=>setNewA(a=>({...a,partidas:a.partidas.map((p,j)=>j===i?{...p,[k]:k==='cuentaId'?v:parseFloat(v)||0}:p)}));
  const delPartida=(i)=>setNewA(a=>({...a,partidas:a.partidas.filter((_,j)=>j!==i)}));
  const saveAsiento=()=>{
    const totalD=newA.partidas.reduce((s,p)=>s+p.debe,0);
    const totalH=newA.partidas.reduce((s,p)=>s+p.haber,0);
    if(Math.abs(totalD-totalH)>0.01){alert(`La partida no cuadra: Debe ${fmtQ(totalD)} ≠ Haber ${fmtQ(totalH)}`);return;}
    if(!newA.descripcion){alert('Ingresa una descripción');return;}
    const a=mkAsiento(genId(),newA.fecha,newA.descripcion,'Manual','',newA.partidas.map(p=>[p.cuentaId,p.debe,p.haber]));
    dispatch({type:'ADD_ASIENTO',payload:a});
    setNewA({fecha:new Date().toISOString().slice(0,10),descripcion:'',partidas:[{cuentaId:'',debe:0,haber:0},{cuentaId:'',debe:0,haber:0}]});
    setShowForm(false);
  };

  const tabStyle=(id)=>({padding:'8px 16px',borderRadius:'6px 6px 0 0',cursor:'pointer',fontSize:12,fontWeight:600,border:'none',
    background:tab===id?'#fff':'#f5f5f5',color:tab===id?'#FF8C00':'#666',borderBottom:tab===id?'3px solid #FF8C00':'3px solid transparent'});

  const Row2=({label,value,bold,indent=0,color})=>(
    <div style={{display:'flex',justifyContent:'space-between',padding:'5px 0',
      borderBottom:'1px solid #f5f5f5',fontSize:13,paddingLeft:indent*16,
      fontWeight:bold?700:400,color:color||'#333'}}>
      <span>{label}</span><span>{value}</span>
    </div>
  );

  const cuentasOp = PLAN_CUENTAS.filter(c=>c.tipo==='cuenta');
  const CLASE_COLOR = {activo:'#3498db',pasivo:'#e74c3c',capital:'#8e44ad',ingreso:'#27ae60',gasto:'#e67e00'};

  return (

      <div style={{display:'flex',gap:2,borderBottom:'2px solid #e8e8e8',marginBottom:20,flexWrap:'wrap'}}>
        {[{id:'plan',l:'📒 Plan de Cuentas'},{id:'diario',l:'📔 Libro Diario'},{id:'comprobacion',l:'⚖️ Bal. Comprobación'},
          {id:'resultados',l:'📊 Estado Resultados'},{id:'balance',l:'🏦 Balance General'}].map(t=>(
          <button key={t.id} style={tabStyle(t.id)} onClick={()=>setTab(t.id)}>{t.l}</button>
        ))}
      </div>

      {/* ── PLAN DE CUENTAS ── */}
      {tab==='plan'&&(
        <div className="card">
          <div style={{padding:'0 0 12px',fontSize:12,color:'#888'}}>
            Plan de Cuentas basado en Código de Comercio Dto.2-70 · Ley IVA Dto.27-92 · Ley ISR Dto.10-2012 · NIIF para PyMEs (SAT GT)
          </div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Código</th><th>Nombre de Cuenta</th><th>Clase</th><th>Naturaleza</th></tr></thead>
              <tbody>
                {PLAN_CUENTAS.map(c=>(
                  <tr key={c.id} style={{background:c.tipo==='titulo'?(c.nivel===1?'#f0f4ff':c.nivel===2?'#f8f9ff':'#fff'):'#fff'}}>
                    <td style={{fontWeight:c.tipo==='titulo'?700:400,paddingLeft:(c.nivel-1)*14+8,color:c.tipo==='titulo'?'#1a1a2e':'#333',fontSize:c.nivel===1?13:12}}>{c.codigo}</td>
                    <td style={{fontWeight:c.tipo==='titulo'?700:400,paddingLeft:(c.nivel-1)*14+8,fontSize:c.nivel===1?13:12}}>{c.nombre}</td>
                    <td>{c.tipo==='cuenta'&&<span style={{background:CLASE_COLOR[c.clase]||'#aaa',color:'#fff',borderRadius:4,padding:'2px 8px',fontSize:10,fontWeight:700}}>{c.clase?.toUpperCase()}</span>}</td>
                    <td style={{fontSize:11,color:'#888'}}>{c.normal==='deudora'?'Deudora':c.normal==='acreedora'?'Acreedora':'—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── LIBRO DIARIO ── */}
      {tab==='diario'&&(
        <div>
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:14}}>
            {canEdit&&<button className="btn btn-primary" onClick={()=>setShowForm(!showForm)}><Icon name="plus"/>Asiento Manual</button>}
          </div>
          {showForm&&(
            <div className="card" style={{marginBottom:16,background:'#fffbf0',border:'1px solid #ffe0a0'}}>
              <h4 style={{fontSize:13,color:'#FF8C00',marginBottom:12}}>NUEVO ASIENTO MANUAL</h4>
              <div className="form-row form-row-2">
                <div className="form-group"><label className="form-label">Fecha</label><input type="date" className="form-control" value={newA.fecha} onChange={e=>setNewA(a=>({...a,fecha:e.target.value}))}/></div>
                <div className="form-group"><label className="form-label">Descripción*</label><input className="form-control" value={newA.descripcion} onChange={e=>setNewA(a=>({...a,descripcion:e.target.value}))}/></div>
              </div>
              <table style={{fontSize:12,marginBottom:10,width:'100%'}}>
                <thead><tr><th style={{padding:'5px 8px',background:'#f8f9fa'}}>Cuenta</th><th>Debe (Q)</th><th>Haber (Q)</th><th></th></tr></thead>
                <tbody>
                  {newA.partidas.map((p,i)=>(
                    <tr key={i}>
                      <td style={{padding:'4px 6px'}}>
                        <select className="form-control" style={{fontSize:12}} value={p.cuentaId} onChange={e=>updPartida(i,'cuentaId',e.target.value)}>
                          <option value="">— Seleccionar cuenta —</option>
                          {cuentasOp.map(c=><option key={c.id} value={c.id}>{c.codigo} — {c.nombre}</option>)}

                      </td>
                      <td style={{padding:'4px 6px'}}><input type="number" min="0" step="0.01" className="form-control" style={{width:90,fontSize:12}} value={p.debe||''} onChange={e=>updPartida(i,'debe',e.target.value)}/></td>
                      <td style={{padding:'4px 6px'}}><input type="number" min="0" step="0.01" className="form-control" style={{width:90,fontSize:12}} value={p.haber||''} onChange={e=>updPartida(i,'haber',e.target.value)}/></td>
                      <td><button onClick={()=>delPartida(i)} style={{background:'none',border:'none',cursor:'pointer',color:'#e53e3e',fontSize:16}}>×</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <button className="btn btn-secondary" style={{fontSize:12}} onClick={addPartida}><Icon name="plus" size={12}/>Agregar línea</button>
                <span style={{fontSize:12,color:'#888',flex:1}}>
                  Debe: <strong>{fmtQ(newA.partidas.reduce((s,p)=>s+p.debe,0))}</strong> ·
                  Haber: <strong>{fmtQ(newA.partidas.reduce((s,p)=>s+p.haber,0))}</strong>
                </span>
                <button className="btn btn-primary" onClick={saveAsiento}><Icon name="check"/>Guardar Asiento</button>
                <button className="btn btn-secondary" onClick={()=>setShowForm(false)}>Cancelar</button>
              </div>
            </div>
          )}
          <div className="card">
            {asientos.length===0?<p style={{textAlign:'center',color:'#aaa',padding:30}}>Sin asientos contables registrados. Los asientos se generan automáticamente al registrar facturas, ventas y producción.</p>:
            asientos.map((a,ai)=>(
              <div key={a.id} style={{borderBottom:'2px solid #f0f0f0',padding:'10px 0',marginBottom:6}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,flexWrap:'wrap',gap:4}}>
                  <div>
                    <span style={{fontWeight:700,fontSize:13}}>Asiento #{asientos.length-ai}</span>
                    <span style={{marginLeft:10,color:'#888',fontSize:12}}>{a.fecha}</span>
                    <span style={{marginLeft:10,background:'#f0f4ff',color:'#3498db',borderRadius:4,padding:'1px 7px',fontSize:10,fontWeight:600}}>{a.origen||'Manual'}</span>
                  </div>
                  <span style={{fontSize:12,color:'#555'}}>{a.descripcion}</span>
                </div>
                <table style={{fontSize:11,width:'100%'}}>
                  <thead><tr style={{background:'#f8f9fa'}}>
                    <th style={{padding:'4px 8px',textAlign:'left'}}>Código</th>
                    <th style={{padding:'4px 8px',textAlign:'left'}}>Cuenta</th>
                    <th style={{padding:'4px 8px',textAlign:'right'}}>Debe</th>
                    <th style={{padding:'4px 8px',textAlign:'right'}}>Haber</th>
                  </tr></thead>
                  <tbody>
                    {a.partidas?.map((p,pi)=>(
                      <tr key={pi} style={{borderBottom:'1px solid #f5f5f5'}}>
                        <td style={{padding:'3px 8px',color:'#888'}}>{p.cuentaCodigo}</td>
                        <td style={{padding:'3px 8px',paddingLeft:p.haber>0?24:8}}>{p.cuentaNombre}</td>
                        <td style={{padding:'3px 8px',textAlign:'right',color:'#1a4fa0',fontWeight:p.debe>0?600:400}}>{p.debe>0?fmtQ(p.debe):'—'}</td>
                        <td style={{padding:'3px 8px',textAlign:'right',color:'#8e44ad',fontWeight:p.haber>0?600:400}}>{p.haber>0?fmtQ(p.haber):'—'}</td>
                      </tr>
                    ))}
                    <tr style={{borderTop:'1px solid #ddd',fontWeight:700,fontSize:12}}>
                      <td colSpan="2" style={{padding:'4px 8px',textAlign:'right',color:'#555'}}>TOTALES</td>
                      <td style={{padding:'4px 8px',textAlign:'right',color:'#1a4fa0'}}>{fmtQ(a.partidas?.reduce((s,p)=>s+p.debe,0)||0)}</td>
                      <td style={{padding:'4px 8px',textAlign:'right',color:'#8e44ad'}}>{fmtQ(a.partidas?.reduce((s,p)=>s+p.haber,0)||0)}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── BALANCE DE COMPROBACIÓN ── */}
      {tab==='comprobacion'&&(
        <div className="card">
          <div style={{fontWeight:700,fontSize:14,marginBottom:14,color:'#1a1a2e'}}>Balance de Comprobación — Sumas y Saldos</div>
          <div className="table-wrap">
            <table>
              <thead><tr style={{background:'#f0f4ff'}}>
                <th>Código</th><th>Cuenta</th><th style={{textAlign:'right'}}>Debe</th><th style={{textAlign:'right'}}>Haber</th><th style={{textAlign:'right'}}>Saldo Deudor</th><th style={{textAlign:'right'}}>Saldo Acreedor</th>
              </tr></thead>
              <tbody>
                {cuentasOp.filter(c=>saldos[c.id]&&(saldos[c.id].debe>0||saldos[c.id].haber>0)).map(c=>{
                  const s=saldos[c.id]||{debe:0,haber:0};
                  const sd=c.normal==='deudora'?Math.max(0,s.debe-s.haber):0;
                  const sh=c.normal==='acreedora'?Math.max(0,s.haber-s.debe):0;
                  return <tr key={c.id} style={{borderBottom:'1px solid #f5f5f5'}}>
                    <td style={{color:'#888',fontSize:12}}>{c.codigo}</td>
                    <td>{c.nombre}</td>
                    <td style={{textAlign:'right',color:'#1a4fa0'}}>{fmtQ(s.debe)}</td>
                    <td style={{textAlign:'right',color:'#8e44ad'}}>{fmtQ(s.haber)}</td>

                    <td style={{textAlign:'right',fontWeight:600}}>{sh>0?fmtQ(sh):'—'}</td>

/* ═══════════════════════════════════════════════════════════
   REDUCER
═══════════════════════════════════════════════════════════ */
const reducer = (state,action) => {
  let next;
  switch(action.type){
    case 'ADD_COT':    next={...state,cotizaciones:[action.payload,...state.cotizaciones]}; break;
    case 'UPDATE_COT': next={...state,cotizaciones:state.cotizaciones.map(c=>c.id===action.payload.id?action.payload:c)}; break;
    case 'DEL_COT':    next={...state,cotizaciones:state.cotizaciones.filter(c=>c.id!==action.payload)}; break;
    case 'ADD_PROD':
      if(state.productos.some(p=>p.id===action.payload.id)) { next=state; break; }
      next={...state,productos:[...state.productos,action.payload]}; break;
    case 'UPDATE_PROD': next={...state,productos:state.productos.map(p=>p.id===action.payload.id?action.payload:p)}; break;
    case 'DEL_PROD':    next={...state,productos:state.productos.filter(p=>p.id!==action.payload)}; break;
    case 'ADD_CLIENTE':    next={...state,clientes:[...state.clientes,action.payload]}; break;
    case 'UPDATE_CLIENTE': next={...state,clientes:state.clientes.map(c=>c.id===action.payload.id?action.payload:c)}; break;
    case 'DEL_CLIENTE':    next={...state,clientes:state.clientes.filter(c=>c.id!==action.payload)}; break;
    case 'ADD_TRANS':    next={...state,transacciones:[action.payload,...state.transacciones]}; break;
    case 'UPDATE_TRANS': next={...state,transacciones:state.transacciones.map(t=>t.id===action.payload.id?action.payload:t)}; break;
    case 'DEL_TRANS':    next={...state,transacciones:state.transacciones.filter(t=>t.id!==action.payload)}; break;
    case 'ADD_ASIENTO': next={...state,asientos:[action.payload,...(state.asientos||[])]}; break;
    case 'ADD_PRESUPUESTO':    next={...state,presupuestos:[action.payload,...(state.presupuestos||[])]}; break;
    case 'UPDATE_PRESUPUESTO': next={...state,presupuestos:(state.presupuestos||[]).map(p=>p.id===action.payload.id?action.payload:p)}; break;
    case 'DEL_PRESUPUESTO':    next={...state,presupuestos:(state.presupuestos||[]).filter(p=>p.id!==action.payload)}; break;
    case 'ADD_PROYECTO':    next={...state,proyectos:[action.payload,...(state.proyectos||[])]}; break;
    case 'UPDATE_PROYECTO': next={...state,proyectos:(state.proyectos||[]).map(p=>p.id===action.payload.id?action.payload:p)}; break;
    case 'DEL_PROYECTO':    next={...state,proyectos:(state.proyectos||[]).filter(p=>p.id!==action.payload)}; break;
    case 'ADD_PAGO_CLI':    next={...state,pagosClientes:[action.payload,...(state.pagosClientes||[])]}; break;
    case 'DEL_PAGO_CLI':    next={...state,pagosClientes:(state.pagosClientes||[]).filter(p=>p.id!==action.payload)}; break;
    case 'ADD_PAGO_PROV':   next={...state,pagosProveedores:[action.payload,...(state.pagosProveedores||[])]}; break;
    case 'DEL_PAGO_PROV':   next={...state,pagosProveedores:(state.pagosProveedores||[]).filter(p=>p.id!==action.payload)}; break;
    case 'SET_UNIDADES':        next={...state,unidades:action.payload}; break;
    case 'SET_CONFIG_EMPRESA':  next={...state,config_empresa:action.payload}; break;
    case 'IMPORT_DATA':
      next={...state,...action.payload};
      break;

    case 'DEL_ASIENTO': next={...state,asientos:(state.asientos||[]).filter(a=>a.id!==action.payload)}; break;
    // VENTA: ADD_ORDEN tipo=venta genera asiento contable
    case 'ADD_ORDEN': {
      const orden = action.payload;
      let asientos = state.asientos||[];
      if(orden.tipo==='venta') {
        const tot  = orden.total||0;
        // PC: DB Cuentas por Cobrar / CR Ingresos Brutos
        // IVA PC (5%) se registra al cierre mensual, no por factura
        const partidas = [['1.1.03',tot,0],['4.1.01',0,tot]];
        const asi = mkAsiento(genId(),orden.fecha,`Factura Venta PC — ${orden.clienteNombre||''}  N°${orden.numeroFactura||''}  (Cot: ${orden.cotizacionRef||''})`, 'Ventas', orden.id, partidas);
        asientos = [asi,...asientos];
      }
      next={...state,ordenes:[orden,...state.ordenes],asientos};
      break;
    }
    case 'DEL_ORDEN':  next={...state,ordenes:state.ordenes.filter(o=>o.id!==action.payload)}; break;
    // FACTURA COMPRA: actualiza stock + egreso finanzas + asiento contable
    case 'ADD_FACTURA_COMPRA': {
      const fac = action.payload;
      let prods = state.productos.map(p=>{
        const item = fac.items?.find(i=>i.productoId===p.id);
        if(!item) return p;
        const newCosto = item.precioUnitario>0 ? parseFloat(item.precioUnitario.toFixed(2)) : p.costo;
        return {...p, stock: (p.stock||0)+item.cantidad, costo: newCosto};
      });
      const trans = {id:genId(),fecha:fac.fecha,tipo:'egreso',categoria:'Compra',descripcion:`Factura compra ${fac.numeroFactura||''} — ${fac.proveedorNombre||fac.proveedor||''}`,monto:fac.total,referencia:fac.id};
      // Asiento PC: DB Inventario (costo TOTAL incluye IVA compra) / CR Cuentas por Pagar
      // PC no tiene crédito fiscal: el IVA pagado en compras es parte del costo
      const tot = fac.total||0;
      const facPartidas = [['1.1.05',tot,0],['2.1.01',0,tot]];
      const asiC = mkAsiento(genId(),fac.fecha,`Factura Compra PC — ${fac.proveedorNombre||fac.proveedor||''}  N°${fac.numeroFactura||''} (IVA incluido en costo)`, 'Compras', fac.id, facPartidas);
      next={...state, ordenes:[fac,...state.ordenes], productos:prods, transacciones:[trans,...state.transacciones], asientos:[asiC,...(state.asientos||[])]};
      break;
    }
    // PROVEEDORES
    case 'ADD_PROVEEDOR':    next={...state,proveedores:[...( state.proveedores||[]),action.payload]}; break;
    case 'UPDATE_PROVEEDOR': next={...state,proveedores:(state.proveedores||[]).map(p=>p.id===action.payload.id?action.payload:p)}; break;
    case 'DEL_PROVEEDOR':    next={...state,proveedores:(state.proveedores||[]).filter(p=>p.id!==action.payload)}; break;
    // RECETAS
    case 'ADD_RECETA':    next={...state,recetas:[...state.recetas,action.payload]}; break;
    case 'UPDATE_RECETA': next={...state,recetas:state.recetas.map(r=>r.id===action.payload.id?action.payload:r)}; break;
    case 'DEL_RECETA':    next={...state,recetas:state.recetas.filter(r=>r.id!==action.payload)}; break;
    // PRODUCCIÓN
    case 'EJECUTAR_PRODUCCION': {
      const {receta, cantidad, costoTotal, costoUnitario, notas} = action.payload;
      // 1. Descontar materias primas del inventario
      let prods = state.productos.map(p=>{
        const mat = receta.materiales.find(m=>m.productoId===p.id);
        if(mat) return {...p, stock: Math.max(0, p.stock - mat.cantidad*cantidad)};
        return p;
      });
      // 2. Sumar producto terminado al inventario y actualizar costo
      prods = prods.map(p=> p.id===receta.productoFinalId ? {...p, stock: p.stock+cantidad, costo: parseFloat(costoUnitario.toFixed(2))} : p);
      // 3. Registrar orden de producción
      const orden = {id:genId(), fecha:new Date().toISOString().slice(0,10), recetaId:receta.id, recetaNombre:receta.nombre, productoFinalId:receta.productoFinalId, cantidad, costoTotal, costoUnitario, notas, materiales:receta.materiales};
      // 4. Registrar egreso en finanzas
      const trans = {id:genId(), fecha:orden.fecha, tipo:'egreso', categoria:'Producción', descripcion:`Producción: ${receta.nombre} × ${cantidad} u`, monto:costoTotal, referencia:orden.id};
      // 5. Asiento: DB Inventario PT / CR Inventario MP
      const asiP = mkAsiento(genId(),orden.fecha,`Producción: ${receta.nombre} × ${cantidad} u`, 'Producción', orden.id,
        [['1.1.07',costoTotal,0],['1.1.06',0,costoTotal]]);
      next = {...state, productos:prods, ordenes_produccion:[orden,...(state.ordenes_produccion||[])], transacciones:[trans,...state.transacciones], asientos:[asiP,...(state.asientos||[])]};
      break;
    }
    default: return state;
  }
  // Persist — localStorage inmediato + Supabase async
  const _KEYS=['cotizaciones','productos','clientes','transacciones','ordenes','proveedores','asientos','recetas','ordenes_produccion','presupuestos','proyectos','pagosClientes','pagosProveedores'];
  _KEYS.forEach(k=>save(k,next[k]));
  if(next.config_empresa!==undefined) save('config_empresa',next.config_empresa);
  (async()=>{try{switch(action.type){
    case 'ADD_COT': case 'UPDATE_COT': await dbUpsert('cotizaciones',action.payload); break;
    case 'DEL_COT': await dbDelete('cotizaciones',action.payload); break;
    case 'ADD_PROD': case 'UPDATE_PROD': await dbUpsert('productos',action.payload); break;
    case 'DEL_PROD': await dbDelete('productos',action.payload); break;
    case 'ADD_CLIENTE': case 'UPDATE_CLIENTE': await dbUpsert('clientes',action.payload); break;
    case 'DEL_CLIENTE': await dbDelete('clientes',action.payload); break;
    case 'ADD_TRANS': case 'UPDATE_TRANS': await dbUpsert('transacciones',action.payload); break;
    case 'DEL_TRANS': await dbDelete('transacciones',action.payload); break;
    case 'ADD_ASIENTO': await dbUpsert('asientos',action.payload); break;
    case 'DEL_ASIENTO': await dbDelete('asientos',action.payload); break;
    case 'ADD_ORDEN': await dbUpsert('ordenes',action.payload); break;
    case 'DEL_ORDEN': await dbDelete('ordenes',action.payload); break;
    case 'ADD_FACTURA_COMPRA':
      await dbUpsert('ordenes',action.payload);
      if(next.productos) await Promise.all(next.productos.map(p=>dbUpsert('productos',p)));
      break;
    case 'ADD_PROVEEDOR': case 'UPDATE_PROVEEDOR': await dbUpsert('proveedores',action.payload); break;
    case 'DEL_PROVEEDOR': await dbDelete('proveedores',action.payload); break;
    case 'ADD_PAGO_CLI': await dbUpsert('pagosClientes',action.payload); break;
    case 'DEL_PAGO_CLI': await dbDelete('pagosClientes',action.payload); break;
    case 'ADD_PAGO_PROV': await dbUpsert('pagosProveedores',action.payload); break;
    case 'DEL_PAGO_PROV': await dbDelete('pagosProveedores',action.payload); break;
    case 'ADD_RECETA': case 'UPDATE_RECETA': await dbUpsert('recetas',action.payload); break;
    case 'DEL_RECETA': await dbDelete('recetas',action.payload); break;
    case 'EJECUTAR_PRODUCCION':
      if(next.ordenes_produccion?.[0]) await dbUpsert('ordenes_produccion',next.ordenes_produccion[0]);
      if(next.transacciones?.[0]) await dbUpsert('transacciones',next.transacciones[0]);
      if(next.asientos?.[0]) await dbUpsert('asientos',next.asientos[0]);
      if(next.productos) await Promise.all(next.productos.map(p=>dbUpsert('productos',p)));
      break;
    case 'ADD_PRESUPUESTO': case 'UPDATE_PRESUPUESTO': await dbUpsert('presupuestos',action.payload); break;
    case 'DEL_PRESUPUESTO': await dbDelete('presupuestos',action.payload); break;
    case 'ADD_PROYECTO': case 'UPDATE_PROYECTO': await dbUpsert('proyectos',action.payload); break;
    case 'DEL_PROYECTO': await dbDelete('proyectos',action.payload); break;
    case 'SET_UNIDADES': await dbSaveList('unidades',action.payload); break;
    case 'SET_CONFIG_EMPRESA': await dbSaveConfig(action.payload); break;
    case 'IMPORT_DATA':
      // IMPORT_DATA es solo para cargar datos en memoria — NO hacer upsert
      // (evita loop infinito: fetch→dispatch→upsert→fetch→...)
      break;
    default:break;
  }}catch(e){console.warn('Supabase sync error:',e);}})();
  return next;
};

/* ── Hash SHA-256 de contraseña (hex string) ─────────────────────────────
   Para generar el hash de una nueva contraseña desde la consola del navegador:
   crypto.subtle.digest('SHA-256', new TextEncoder().encode('tuContraseña'))
     .then(b => console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')))
   ─────────────────────────────────────────────────────────────────────── */
const hashPwd = async (pwd) => {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pwd));
  return [...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,'0')).join('');
};

              style={{width:'100%',padding:'11px 42px 11px 14px',border:'2px solid #e2e8f0',borderRadius:8,fontSize:14,outline:'none',transition:'.2s',fontFamily:'Roboto,sans-serif',boxSizing:'border-box'}}
              value={password} onChange={e=>{setPassword(e.target.value);setError('');}}
              placeholder="••••••" autoComplete="current-password"
              onFocus={e=>e.target.style.borderColor='#FF8C00'} onBlur={e=>e.target.style.borderColor='#e2e8f0'}/>
            <button type="button" onClick={()=>setShowPass(v=>!v)}
              style={{position:'absolute',right:12,top:36,background:'none',border:'none',cursor:'pointer',color:'#aaa',fontSize:13,padding:'2px 4px'}}>
              {showPass?'🙈':'👁️'}
            </button>
          </div>
          {error&&<div style={{background:'#fee2e2',color:'#c0392b',borderRadius:8,padding:'10px 14px',fontSize:13,marginBottom:16,display:'flex',alignItems:'center',gap:8}}>⚠️ {error}</div>}
          <button type="submit"
            style={{width:'100%',padding:'13px',background:'linear-gradient(135deg,#FF8C00,#e67e00)',color:'#fff',border:'none',borderRadius:10,fontSize:15,fontWeight:700,cursor:'pointer',fontFamily:'Montserrat,sans-serif',transition:'.2s',letterSpacing:.3}}
            onMouseEnter={e=>e.target.style.transform='translateY(-1px)'} onMouseLeave={e=>e.target.style.transform=''}>
            Iniciar Sesión
          </button>
        </form>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════
   PRESUPUESTOS
═══════════════════════════════════════════════════════════ */
const Presupuestos = ({state, dispatch}) => {
  const hoy = new Date();
  const [periodo, setPeriodo] = useState(`${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}`);
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({categoria:'',descripcion:'',tipo:'ingreso',monto:0});
  const {canEdit} = React.useContext(AuthContext);

  const presupuestos = (state.presupuestos||[]).filter(p=>p.periodo===periodo);
  const totalPresIngr = presupuestos.filter(p=>p.tipo==='ingreso').reduce((s,p)=>s+p.monto,0);
  const totalPresGast = presupuestos.filter(p=>p.tipo==='gasto').reduce((s,p)=>s+p.monto,0);

  const [anio, mes] = periodo.split('-').map(Number);
  const transReal = state.transacciones.filter(t=>{
    const d=new Date(t.fecha); return d.getFullYear()===anio && d.getMonth()+1===mes;
  });
  const realIngr = transReal.filter(t=>t.tipo==='ingreso').reduce((s,t)=>s+t.monto,0);
  const realGast = transReal.filter(t=>t.tipo==='egreso').reduce((s,t)=>s+t.monto,0);

  const save = () => {
    const item = {...form, id: editing?.id||genId(), periodo, monto: parseFloat(form.monto)||0};
    if(!item.descripcion||!item.monto){alert('Completa descripción y monto');return;}
    dispatch({type: editing?'UPDATE_PRESUPUESTO':'ADD_PRESUPUESTO', payload: item});
    setShowForm(false); setEditing(null); setForm({categoria:'',descripcion:'',tipo:'ingreso',monto:0});
  };
  const del = (id) => dispatch({type:'DEL_PRESUPUESTO', payload:id});
  const pct = (real,pres) => pres>0?Math.min(100,Math.round(real/pres*100)):0;

  const CATS_INGR = ['Ventas servicios','Ventas productos','Capacitaciones','Proyectos','Otros ingresos'];
  const CATS_GAST = ['Sueldos','Alquiler','Compras insumos','Marketing','Transporte','Servicios básicos','Impuestos','Otros gastos'];

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:20,flexWrap:'wrap'}}>
        <input type="month" className="form-control" style={{width:180}} value={periodo} onChange={e=>setPeriodo(e.target.value)}/>
        {canEdit&&<button className="btn btn-primary" onClick={()=>{setEditing(null);setForm({categoria:'',descripcion:'',tipo:'ingreso',monto:0});setShowForm(true)}} style={{marginLeft:'auto'}}><Icon name="plus"/>Nueva Línea</button>}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
        <StatCard2 label="INGRESOS PRESUPUESTADOS" value={fmtQ(totalPresIngr)} sub="del período" color="#008000" icon="📈"/>
        <StatCard2 label="INGRESOS REALES" value={fmtQ(realIngr)} sub={`${pct(realIngr,totalPresIngr)}% del presupuesto`} color="#27ae60" icon="✅"/>
        <StatCard2 label="GASTOS PRESUPUESTADOS" value={fmtQ(totalPresGast)} sub="del período" color="#c0392b" icon="📉"/>
        <StatCard2 label="GASTOS REALES" value={fmtQ(realGast)} sub={`${pct(realGast,totalPresGast)}% del presupuesto`} color="#e74c3c" icon="⚠️"/>
      </div>

      {showForm&&(
        <div className="card" style={{marginBottom:16,background:'#fffbf0',border:'1px solid #ffe0a0',padding:18}}>
          <h4 style={{fontSize:13,color:'#FF8C00',marginBottom:12}}>{editing?'Editar Línea':'Nueva Línea de Presupuesto'}</h4>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 140px',gap:10}}>
            <div className="form-group"><label className="form-label">Tipo</label>
              <select className="form-control" value={form.tipo} onChange={e=>setForm(f=>({...f,tipo:e.target.value}))}>
                <option value="ingreso">Ingreso</option><option value="gasto">Gasto</option>
              </select>
            </div>
            <div className="form-group"><label className="form-label">Categoría</label>
              <input className="form-control" list="cats-pres" value={form.categoria} onChange={e=>setForm(f=>({...f,categoria:e.target.value}))} placeholder="Categoría"/>
              <datalist id="cats-pres">{[...CATS_INGR,...CATS_GAST].map(c=><option key={c} value={c}/>)}</datalist>
            </div>
            <div className="form-group"><label className="form-label">Descripción*</label>
              <input className="form-control" value={form.descripcion} onChange={e=>setForm(f=>({...f,descripcion:e.target.value}))} placeholder="Descripción del ítem"/>
            </div>
            <div className="form-group"><label className="form-label">Monto (Q)*</label>
              <input type="number" className="form-control" value={form.monto} onChange={e=>setForm(f=>({...f,monto:e.target.value}))} min="0" step="0.01"/>
            </div>
          </div>
          <div style={{display:'flex',gap:8,marginTop:8}}>
            <button className="btn btn-primary" onClick={save}><Icon name="check"/>Guardar</button>
            <button className="btn btn-secondary" onClick={()=>{setShowForm(false);setEditing(null);}}>Cancelar</button>
          </div>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        {['ingreso','gasto'].map(tipo=>{
          const items = presupuestos.filter(p=>p.tipo===tipo);
          const totalPres = items.reduce((s,p)=>s+p.monto,0);
          const totalReal = tipo==='ingreso'?realIngr:realGast;
          const color = tipo==='ingreso'?'#008000':'#c0392b';
          return (
            <div key={tipo} className="card">
              <div className="card-header">
                <h3 style={{color}}>{tipo==='ingreso'?'📈 Ingresos':'📉 Gastos'}</h3>
                <div style={{fontSize:12,color:'#888'}}>Presupuestado: <strong style={{color}}>{fmtQ(totalPres)}</strong> · Real: <strong>{fmtQ(totalReal)}</strong></div>
              </div>
              <div className="table-wrap">
                <table>
                  <thead><tr><th>Categoría</th><th>Descripción</th><th style={{textAlign:'right'}}>Presupuesto</th><th style={{textAlign:'right'}}>% Ejec.</th>{canEdit&&<th>Acc.</th>}</tr></thead>
                  <tbody>
                    {items.length===0?<tr><td colSpan="5" style={{textAlign:'center',color:'#aaa',padding:20}}>Sin líneas. Agrega tu primer presupuesto.</td></tr>:
                    items.map(p=>{
                      const realCat = transReal.filter(t=>(tipo==='ingreso'?t.tipo==='ingreso':t.tipo==='egreso')&&t.categoria===p.categoria).reduce((s,t)=>s+t.monto,0);
                      const pc = pct(realCat,p.monto);
                      return (
                        <tr key={p.id}>
                          <td><span style={{fontSize:11,background:'#f0f0f0',padding:'2px 8px',borderRadius:10}}>{p.categoria||'—'}</span></td>
                          <td>{p.descripcion}</td>
                          <td style={{textAlign:'right',fontWeight:600,color}}>{fmtQ(p.monto)}</td>
                          <td style={{textAlign:'right'}}>
                            <div style={{display:'flex',alignItems:'center',gap:6,justifyContent:'flex-end'}}>
                              <div style={{width:60,height:6,background:'#f0f0f0',borderRadius:3,overflow:'hidden'}}>
                                <div style={{width:`${pc}%`,height:'100%',background:pc>100?'#e74c3c':pc>80?'#f39c12':color,borderRadius:3}}/>
                              </div>
                              <span style={{fontSize:11,color:pc>100?'#e74c3c':'#666'}}>{pc}%</span>
                            </div>
                          </td>
                          {canEdit&&<td style={{display:'flex',gap:4}}>
                            <button className="btn btn-sm btn-outline" onClick={()=>{setEditing(p);setForm({categoria:p.categoria,descripcion:p.descripcion,tipo:p.tipo,monto:p.monto});setShowForm(true);}}><Icon name="edit" size={12}/></button>
                            <button className="btn btn-sm btn-danger" onClick={()=>del(p.id)}><Icon name="trash" size={12}/></button>
                          </td>}
                        </tr>
                      );
                    })}
                  </tbody>
                  <tfoot><tr style={{fontWeight:700,background:'#f8f9fa'}}>
                    <td colSpan="2">TOTAL</td>
                    <td style={{textAlign:'right',color}}>{fmtQ(totalPres)}</td>
                    <td style={{textAlign:'right'}}>
                      <span style={{color:totalReal>totalPres&&tipo==='gasto'?'#e74c3c':tipo==='ingreso'&&totalReal>=totalPres?'#008000':'#666',fontWeight:700}}>
                        {pct(totalReal,totalPres)}%
                      </span>
                    </td>
                    {canEdit&&<td/>}
                  </tr></tfoot>
                </table>
              </div>
            </div>
          );
        })}
      </div>

      <div className="card" style={{marginTop:16}}>
        <div className="card-header"><h3>📊 Resumen del Período — {periodo}</h3></div>
        <div style={{padding:16,display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
          <div style={{textAlign:'center',padding:16,background:'#f0fff0',borderRadius:10,border:'1px solid #d1fae5'}}>
            <div style={{fontSize:12,color:'#888',marginBottom:4}}>Superávit/Déficit Presupuestado</div>
            <div style={{fontSize:22,fontWeight:800,color:(totalPresIngr-totalPresGast)>=0?'#008000':'#c0392b',fontFamily:'Montserrat,sans-serif'}}>{fmtQ(totalPresIngr-totalPresGast)}</div>
          </div>
          <div style={{textAlign:'center',padding:16,background:'#f0f8ff',borderRadius:10,border:'1px solid #bfdbfe'}}>
            <div style={{fontSize:12,color:'#888',marginBottom:4}}>Superávit/Déficit Real</div>
            <div style={{fontSize:22,fontWeight:800,color:(realIngr-realGast)>=0?'#008000':'#c0392b',fontFamily:'Montserrat,sans-serif'}}>{fmtQ(realIngr-realGast)}</div>
          </div>
          <div style={{textAlign:'center',padding:16,background:'#fffbf0',borderRadius:10,border:'1px solid #ffe0a0'}}>
            <div style={{fontSize:12,color:'#888',marginBottom:4}}>Variación vs Presupuesto</div>
            <div style={{fontSize:22,fontWeight:800,color:'#FF8C00',fontFamily:'Montserrat,sans-serif'}}>{fmtQ((realIngr-realGast)-(totalPresIngr-totalPresGast))}</div>
          </div>
        </div>
      </div>
    </div>
  );
};
