const getNextCode = (categoria, productos) => {
  const prefix = CATEGORIA_PREFIX[categoria] || 'PROD';
  const existing = productos.filter(p => p.codigo && p.codigo.startsWith(prefix+'-'));
  const nums = existing.map(p => { const m=p.codigo.match(/(\d+)$/); return m?parseInt(m[1]):0; });
  const next = nums.length > 0 ? Math.max(...nums)+1 : 1;
  return `${prefix}-${String(next).padStart(3,'0')}`;
};

const SUPABASE_URL = 'https://onblvtxsnzbdwdwqisxt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_WFOrcN0znlDjmwsq6bunIw_evqyUISr';
const _sbHdrs = () => ({'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'});
const _sbFetch = async (method, table, body, params) => {
  let url = SUPABASE_URL+'/rest/v1/'+table;
  if(params){ const p=new URLSearchParams(); Object.entries(params).forEach(([k,v])=>p.append(k,v)); url+='?'+p; }
  const opts = {method, headers:{..._sbHdrs(), Prefer: method==='POST'?'resolution=merge-duplicates':''}};
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if(!r.ok){ const e=await r.text(); throw new Error(e); }
  return r.status===204 ? null : (method==='DELETE'?null:r.json());
};
const _sbChannels = {};
let _sbWS = null;
const _sbGetWS = () => {
  if(_sbWS) return;
  const wsUrl = SUPABASE_URL.replace('https','wss')+'/realtime/v1/websocket?apikey='+SUPABASE_KEY+'&vsn=1.0.0';
  _sbWS = new WebSocket(wsUrl);
  _sbWS.onopen = () => { Object.values(_sbChannels).forEach(ch=>{ if(ch.ready) ch.ready(); }); };
  _sbWS.onmessage = (e) => {
    try{ const msg=JSON.parse(e.data); if(msg.event==='postgres_changes'&&msg.payload){ const tbl=msg.payload.table; Object.values(_sbChannels).forEach(ch=>{if(ch.table===tbl)ch.cb();}); } }catch(err){}
  };
};
const sb = {
  from: (table) => ({
    select: (cols) => ({
      order: (col, opts) => ({
        then: (res,rej) => _sbFetch('GET',table,null,{select:cols||'*',order:col+(opts&&opts.ascending?'.asc':'.desc')}).then(res).catch(rej)
      }),
      eq: (col,val) => ({
        single: () => _sbFetch('GET',table,null,{select:cols||'*',[col]:'eq.'+val,limit:1}).then(rows=>rows&&rows[0]?rows[0]:null)
      }),
      then: (res,rej) => _sbFetch('GET',table,null,{select:cols||'*'}).then(res).catch(rej)
    }),
    upsert: (row,opts) => ({
      then: (res,rej) => _sbFetch('POST',table+'?on_conflict='+(opts&&opts.onConflict||'id'),Array.isArray(row)?row:[row]).then(res).catch(rej)
    }),
    insert: (rows) => ({
      then: (res,rej) => _sbFetch('POST',table,Array.isArray(rows)?rows:[rows]).then(res).catch(rej)
    }),
    delete: () => ({
      eq: (col,val) => ({ then: (res,rej) => _sbFetch('DELETE',table,null,{[col]:'eq.'+val}).then(res).catch(rej) }),
      neq: (col,val) => ({ then: (res,rej) => _sbFetch('DELETE',table,null,{[col]:'neq.'+val}).then(res).catch(rej) })
    })
  }),
  channel: (name) => {
    const ch = {name,table:null,cb:null};
    _sbChannels[name] = ch;
    return { on: (ev,filter,callback) => { ch.table=filter.table; ch.cb=callback; _sbGetWS(); return {subscribe:()=>({unsubscribe:()=>delete _sbChannels[name]})}; } };
  },
  removeChannel: (ch) => { if(ch&&ch.name) delete _sbChannels[ch.name]; }
};

const dbLoad = async (k) => {
  const table = DB_TABLES[k]; if(!table) return null;
  try {
    if(k==='config_empresa'){
      const {data,error}=await sb.from(table).select('*').eq('id',1).single();
      if(error) return null;
      const {id,updated_at,...cfg}=data||{}; return Object.keys(cfg).length?cfg:null;
    }
    const {data,error}=await sb.from(table).select('*').order('created_at',{ascending:false});
    if(error){console.warn('dbLoad',k,error);return null;}
    return (data||[]).map(row=>{
      const {created_at,updated_at,...rest}=row;
      JSONB_FIELDS.forEach(f=>{if(typeof rest[f]==='string')try{rest[f]=JSON.parse(rest[f]);}catch{}});
      return rest;
    });
  }catch(e){console.warn('dbLoad exception',k,e);return null;}
};
const dbUpsert = async (k,record) => {
  const table=DB_TABLES[k]; if(!table)return;
  try{
    const row={...record};
    JSONB_FIELDS.forEach(f=>{if(row[f]!==undefined&&typeof row[f]!=='string')row[f]=JSON.stringify(row[f]);});
    const {error}=await sb.from(table).upsert(row,{onConflict:'id'});
    if(error)console.warn('dbUpsert',k,error);
  }catch(e){console.warn('dbUpsert exception',k,e);}
};
const dbDelete = async (k,id) => {
  const table=DB_TABLES[k]; if(!table)return;
  try{const {error}=await sb.from(table).delete().eq('id',id);if(error)console.warn('dbDelete',k,error);}
  catch(e){console.warn('dbDelete exception',k,e);}
};
const dbSaveConfig = async (cfg) => {
  try{const {error}=await sb.from(DB_TABLES.config_empresa).upsert({id:1,...cfg},{onConflict:'id'});if(error)console.warn('dbSaveConfig',error);}
  catch(e){console.warn('dbSaveConfig exception',e);}
};
const dbSaveList = async (k,arr) => {
  const table=DB_TABLES[k]; if(!table)return;
  try{
    await sb.from(table).delete().neq('id','__never__');
    if(arr&&arr.length){const rows=arr.map((item,i)=>({id:item.id||String(i+1),...item}));const {error}=await sb.from(table).insert(rows);if(error)console.warn('dbSaveList',k,error);}
  }catch(e){console.warn('dbSaveList exception',k,e);}
};

   DASHBOARD

const Dashboard = ({state}) => {
  const {cotizaciones,clientes,productos,transacciones,compras} = state;
  const totalIngresos = transacciones.filter(t=>t.tipo==='ingreso').reduce((s,t)=>s+t.monto,0);
  const totalEgresos = transacciones.filter(t=>t.tipo==='egreso').reduce((s,t)=>s+t.monto,0);
  const cotPendientes = cotizaciones.filter(c=>c.estado==='pendiente').length;
  const stockBajo = productos.filter(p=>p.stock<=p.stockMin && p.stock>0 && p.stockMin>0).length;
  const stockAgotado = productos.filter(p=>p.stock===0 && p.stockMin>0).length;
  const recentCots = [...cotizaciones].sort((a,b)=>b.fecha>a.fecha?1:-1).slice(0,5);
  const stats = [
    {label:'Ingresos del Mes',value:fmtQ(totalIngresos),icon:'trend',bg:'#FF8C00'},
    {label:'Cotizaciones Pendientes',value:cotPendientes,icon:'quote',bg:'#2b6cb0'},
    {label:'Clientes Registrados',value:clientes.length,icon:'clients',bg:'#008000'},
    {label:'Alertas de Stock',value:stockBajo+stockAgotado,icon:'alert',bg:'#e53e3e'},
  ];
  return (
    <div>
      <div className="stats-grid">
        {stats.map((s,i)=>(
          <div key={i} className="stat-card">
            <div className="stat-icon" style={{background:s.bg}}><Icon name={s.icon} color="#fff"/></div>
            <div className="stat-info"><h4 style={{color:s.bg}}>{s.value}</h4><p>{s.label}</p></div>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div className="card">
          <div className="card-header"><h3>Cotizaciones Recientes</h3></div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Número</th><th>Cliente</th><th>Total</th><th>Estado</th></tr></thead>
              <tbody>
                {recentCots.length===0?<tr><td colSpan="4" style={{textAlign:'center',color:'#aaa',padding:'20px'}}>Sin cotizaciones aún</td></tr>:
                recentCots.map(c=>(
                  <tr key={c.id}>
                    <td><strong>{c.numero}</strong></td>
                    <td>{c.cliente?.empresa||c.cliente?.nombre||'—'}</td>
                    <td>{fmtQ(c.total)}</td>
                    <td><span className={`status-badge status-${c.estado}`}>{c.estado}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
        <div className="card">
          <div className="card-header"><h3>Resumen Financiero</h3></div>
          <div className="card-body">
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <div style={{background:'#f0fff4',padding:14,borderRadius:8,borderLeft:'4px solid var(--green)'}}>
                <div style={{fontSize:11,color:'#777',marginBottom:4}}>Total Ingresos</div>
                <div style={{fontSize:22,fontWeight:800,color:'var(--green)',fontFamily:'Montserrat'}}>{fmtQ(totalIngresos)}</div>
              </div>
              <div style={{background:'#fff5f5',padding:14,borderRadius:8,borderLeft:'4px solid var(--red)'}}>
                <div style={{fontSize:11,color:'#777',marginBottom:4}}>Total Egresos</div>
                <div style={{fontSize:22,fontWeight:800,color:'var(--red)',fontFamily:'Montserrat'}}>{fmtQ(totalEgresos)}</div>
              </div>
              <div style={{background:'#fffbf0',padding:14,borderRadius:8,borderLeft:'4px solid var(--orange)'}}>
                <div style={{fontSize:11,color:'#777',marginBottom:4}}>Balance Neto</div>
                <div style={{fontSize:22,fontWeight:800,color:totalIngresos-totalEgresos>=0?'var(--green)':'var(--red)',fontFamily:'Montserrat'}}>{fmtQ(totalIngresos-totalEgresos)}</div>
              </div>
            </div>
          </div>
        </div>
      </div>
      {(stockBajo>0||stockAgotado>0)&&(
        <div className="alert alert-warning" style={{marginTop:16}}>
          <Icon name="alert" size={16}/> <strong>Alerta de Inventario:</strong> {stockAgotado>0&&`${stockAgotado} producto(s) agotado(s). `}{stockBajo>0&&`${stockBajo} producto(s) con stock bajo.`}
        </div>
      )}
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════
   COTIZACIONES
═══════════════════════════════════════════════════════════ */
const QuoteForm = ({productos,cotizacion,onSave,onClose}) => {
  const empty = {
    numero:genQuoteNum(), fecha:new Date().toISOString().slice(0,10),
    validez:'30 días', estado:'pendiente',
    cliente:{nombre:'',empresa:'',nit:'',email:'',telefono:'',direccion:''},
    items:[], notas:'', iva:false,
  };
  const [q,setQ] = useState(cotizacion||empty);
  const [search,setSearch] = useState('');
  const [catFilter,setCatFilter] = useState('');

  // Los precios YA INCLUYEN IVA. El total no varía; si se desglosa, se extrae el IVA incluido.
  const total      = q.items.reduce((s,i)=>s+(i.cantidad*i.precio),0);
  // PC: IVA = 5% sobre el total (no se extrae de precio, es pago mensual a SAT)
  const ivaAmt     = q.iva ? parseFloat((total * REGIMEN.ivaRate).toFixed(2)) : 0;
  const baseAmt    = q.iva ? total : total;
  const subtotal   = total; // alias para compatibilidad
  // Costos y margen: busca en catálogo cuando el ítem no tiene costo guardado
  const getCostoItem = (item) => {
    if (item.costo > 0) return item.costo;
    const prod = productos.find(p => p.id === item.productoId);
    return prod?.costo || 0;
  };
  const costoTotal = q.items.reduce((s,i)=>s+(i.cantidad*getCostoItem(i)),0);
  const ganancia   = total - costoTotal;
  const margenPct  = total > 0 ? (ganancia/total*100) : 0;

  const setCliente = (k,v)=>setQ(p=>({...p,cliente:{...p.cliente,[k]:v}}));
  const addItem = (prod)=>{
    setQ(p=>{
      const ex = p.items.find(i=>i.productoId===prod.id);
      if(ex) return {...p,items:p.items.map(i=>i.productoId===prod.id?{...i,cantidad:i.cantidad+1}:i)};
      return {...p,items:[...p.items,{id:genId(),productoId:prod.id,nombre:prod.nombre,unidad:prod.unidad,cantidad:1,precio:prod.precio,costo:prod.costo||0}]};
    });
  };
  const updItem = (id,k,v)=>setQ(p=>({...p,items:p.items.map(i=>i.id===id?{...i,[k]:parseFloat(v)||0}:i)}));
  const delItem = (id)=>setQ(p=>({...p,items:p.items.filter(i=>i.id!==id)}));

  const prods = productos.filter(p=>p.activo&&
    (catFilter===''||p.categoria===catFilter)&&
    (search===''||(p.nombre||'').toLowerCase().includes(search.toLowerCase())||(p.codigo||'').toLowerCase().includes(search.toLowerCase()))
  );

  const handleSave=()=>{
    if(!q.cliente.nombre&&!q.cliente.empresa){alert('Ingrese el nombre o empresa del cliente.');return;}
    onSave({...q,subtotal:total,ivaAmt,baseAmt,total,costoTotal,ganancia,margenPct,id:q.id||genId()});
  };

  return (
    <Modal title={cotizacion?`Editar Cotización ${q.numero}`:`Nueva Cotización — ${q.numero}`} onClose={onClose} size="lg"
      footer={<><button className="btn btn-secondary" onClick={onClose}>Cancelar</button><button className="btn btn-primary" onClick={handleSave}><Icon name="check"/>Guardar Cotización</button></>}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        {/* LEFT: CLIENT + ITEMS */}
        <div>
          <h4 style={{marginBottom:12,color:'#FF8C00',fontSize:13}}>DATOS DEL CLIENTE</h4>
          <div className="form-row form-row-2">
            <div className="form-group"><label className="form-label">Nombre*</label><input className="form-control" value={q.cliente.nombre} onChange={e=>setCliente('nombre',e.target.value)} placeholder="Nombre contacto"/></div>
            <div className="form-group"><label className="form-label">Empresa</label><input className="form-control" value={q.cliente.empresa} onChange={e=>setCliente('empresa',e.target.value)} placeholder="Empresa S.A."/></div>
          </div>
          <div className="form-row form-row-2">
            <div className="form-group"><label className="form-label">NIT</label><input className="form-control" value={q.cliente.nit} onChange={e=>setCliente('nit',e.target.value)} placeholder="CF o NIT"/></div>
            <div className="form-group"><label className="form-label">Teléfono</label><input className="form-control" value={q.cliente.telefono} onChange={e=>setCliente('telefono',e.target.value)} placeholder="5555-0000"/></div>
          </div>
          <div className="form-group"><label className="form-label">Correo Electrónico</label><input className="form-control" value={q.cliente.email} onChange={e=>setCliente('email',e.target.value)} placeholder="correo@empresa.com"/></div>
          <div className="form-group"><label className="form-label">Dirección</label><input className="form-control" value={q.cliente.direccion} onChange={e=>setCliente('direccion',e.target.value)} placeholder="Zona, Ciudad, Guatemala"/></div>
          <div className="form-row form-row-2">
            <div className="form-group"><label className="form-label">Fecha</label><input type="date" className="form-control" value={q.fecha} onChange={e=>setQ(p=>({...p,fecha:e.target.value}))}/></div>
            <div className="form-group"><label className="form-label">Vigencia</label><input className="form-control" value={q.validez} onChange={e=>setQ(p=>({...p,validez:e.target.value}))}/></div>
          </div>
          <div className="form-group"><label className="form-label">Estado</label>
            <select className="form-control" value={q.estado} onChange={e=>setQ(p=>({...p,estado:e.target.value}))}>
              <option>pendiente</option><option>enviada</option><option>aprobada</option><option>rechazada</option><option>pagada</option>
            </select>
          </div>

          <h4 style={{margin:'16px 0 10px',color:'#FF8C00',fontSize:13}}>ÍTEMS DE COTIZACIÓN</h4>
          {q.items.length===0?<p style={{color:'#aaa',fontSize:12,marginBottom:10}}>Agrega productos desde el panel derecho.</p>:
          <div style={{maxHeight:220,overflowY:'auto',border:'1px solid var(--border)',borderRadius:7}}>
            <table style={{fontSize:12}}>
              <thead><tr><th style={{background:'#f8f9fa',padding:'6px 8px',fontSize:10}}>Producto</th><th>Cant.</th><th>Precio</th><th>Sub.</th><th></th></tr></thead>
              <tbody>
                {q.items.map(i=>(
                  <tr key={i.id}>
                    <td style={{padding:'5px 8px',maxWidth:150}}>{i.nombre}<br/><span style={{fontSize:10,color:'#aaa'}}>{i.unidad}</span></td>
                    <td><input type="number" min="1" value={i.cantidad} onChange={e=>updItem(i.id,'cantidad',e.target.value)} style={{width:50,padding:'3px 5px',border:'1px solid #ddd',borderRadius:4,fontSize:12}}/></td>
                    <td><input type="number" min="0" step="0.01" value={i.precio} onChange={e=>updItem(i.id,'precio',e.target.value)} style={{width:65,padding:'3px 5px',border:'1px solid #ddd',borderRadius:4,fontSize:12}}/></td>
                    <td style={{fontWeight:600}}>{fmtQ(i.cantidad*i.precio)}</td>
                    <td><button onClick={()=>delItem(i.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#e53e3e'}}>×</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>}
          <div style={{marginTop:10,padding:10,background:'#fffbf0',borderRadius:7,border:'1px solid #ffe0a0'}}>
            <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:12,marginBottom:8}}>
              <input type="checkbox" checked={q.iva} onChange={e=>setQ(p=>({...p,iva:e.target.checked}))}/>
              Mostrar nota de Pequeño Contribuyente en cotización
            </label>
            {q.iva&&(
              <div style={{fontSize:11,color:'#e67e00',background:'#fff8f0',borderRadius:5,padding:'5px 8px',marginBottom:6,lineHeight:1.6}}>
                Factura Pequeño Contribuyente — no genera crédito fiscal IVA para el comprador (Art.45 bis Dto.27-92)
              </div>
            )}
            <div style={{display:'flex',justifyContent:'space-between',fontWeight:800,fontSize:15,color:'#FF8C00',borderTop:'2px solid #ffd080',paddingTop:6,marginTop:4}}>
              <span>TOTAL:</span><span>{fmtQ(total)}</span>
            </div>
          </div>
          {/* Análisis de Costos — solo visible internamente */}
          <div style={{marginTop:10,padding:10,background:'#f0f7f0',borderRadius:7,border:'1px solid #b2d8b2'}}>
            <div style={{fontSize:11,fontWeight:700,color:'#1a7a1a',marginBottom:6,letterSpacing:1}}>ANÁLISIS DE COSTOS (INTERNO)</div>
            <div style={{fontSize:12,color:'#444',lineHeight:1.9}}>
              <div style={{display:'flex',justifyContent:'space-between'}}><span>Costo total de ítems:</span><span style={{fontWeight:600}}>{fmtQ(costoTotal)}</span></div>
              <div style={{display:'flex',justifyContent:'space-between'}}><span>Precio de venta:</span><span style={{fontWeight:600}}>{fmtQ(total)}</span></div>
              <div style={{display:'flex',justifyContent:'space-between',borderTop:'1px dashed #8bc88b',paddingTop:5,marginTop:5}}>
                <span>Ganancia bruta:</span>
                <span style={{fontWeight:700,color: ganancia>=0 ? '#1a7a1a' : '#c0392b'}}>{fmtQ(ganancia)}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span>Margen bruto:</span>
                <span style={{fontWeight:700,color: margenPct>=30 ? '#1a7a1a' : margenPct>=15 ? '#e67e00' : '#c0392b'}}>{margenPct.toFixed(1)}%</span>
              </div>
            </div>
            {margenPct>0&&margenPct<15&&<div style={{marginTop:6,fontSize:11,color:'#c0392b',background:'#fdecea',padding:'4px 7px',borderRadius:5}}>⚠ Margen bajo — considera revisar el precio.</div>}
          </div>
          <div className="form-group" style={{marginTop:12}}><label className="form-label">Notas / Condiciones</label>
            <textarea className="form-control" rows={2} value={q.notas} onChange={e=>setQ(p=>({...p,notas:e.target.value}))} placeholder="Condiciones especiales, notas de entrega..."/></div>
        </div>
        {/* RIGHT: PRODUCT SELECTOR */}
        <div>
          <h4 style={{marginBottom:10,color:'#FF8C00',fontSize:13}}>AGREGAR PRODUCTOS / SERVICIOS</h4>
          <div style={{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap'}}>
            <div className="search-bar" style={{flex:1,minWidth:120}}><Icon name="search"/><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar..."/></div>
            <select className="form-control" style={{flex:1,minWidth:120}} value={catFilter} onChange={e=>setCatFilter(e.target.value)}>
              <option value="">Todas</option>
              {CATEGORIAS.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div style={{maxHeight:420,overflowY:'auto',border:'1px solid var(--border)',borderRadius:7}}>
            {prods.map(p=>(
              <div key={p.id} onClick={()=>addItem(p)} style={{padding:'8px 10px',borderBottom:'1px solid #f0f0f0',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}
                onMouseEnter={e=>e.currentTarget.style.background='#fff8f0'} onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
                <div>
                  <div style={{fontSize:12,fontWeight:600}}>{p.nombre}</div>
                  <div style={{fontSize:10,color:'#aaa'}}>{p.categoria} · {p.codigo}</div>
                </div>
                <div style={{textAlign:'right',flexShrink:0,marginLeft:8}}>
                  <div style={{fontWeight:700,color:'#FF8C00',fontSize:13}}>{fmtQ(p.precio)}</div>
                  <div style={{fontSize:10,color:'#aaa'}}>/{p.unidad}</div>
                </div>
              </div>
            ))}
            {prods.length===0&&<p style={{padding:20,color:'#aaa',textAlign:'center',fontSize:12}}>Sin resultados</p>}
          </div>

      </div>
    </Modal>
  );
};

const Cotizaciones = ({state,dispatch}) => {
  const [showForm,setShowForm] = useState(false);
  const [editing,setEditing] = useState(null);
  const [viewing,setViewing] = useState(null);
  const [search,setSearch] = useState('');
  const [stFilter,setStFilter] = useState('');
  const [confirmDel,setConfirmDel] = useState(null);
  const {canEdit} = React.useContext(AuthContext);
  const searchCot = search.trim().toLowerCase();
  const cots = state.cotizaciones.filter(c=>
    (stFilter===''||c.estado===stFilter)&&
    (searchCot===''||(c.numero||'').toLowerCase().includes(searchCot)||
      (c.cliente?.empresa||'').toLowerCase().includes(searchCot)||
      (c.cliente?.nombre||'').toLowerCase().includes(searchCot))
  );
  const saveCot=(q)=>{
    dispatch({type: editing?'UPDATE_COT':'ADD_COT', payload:q});
    setShowForm(false);setEditing(null);
  };
  const convertirAVenta=(c)=>{
    if(c.estado!=='aprobada'&&c.estado!=='pagada'){
      alert('Solo puedes convertir cotizaciones aprobadas o pagadas.');return;
    }
    const items = (c.items||[]).map(i=>({
      id:genId(),productoId:i.productoId,nombre:i.nombre,
      cantidad:i.cantidad,precioUnitario:i.precio,unidad:i.unidad,
    }));
    const factura = {
      id:genId(),tipo:'venta',fecha:new Date().toISOString().slice(0,10),
      clienteNombre:c.cliente?.empresa||c.cliente?.nombre||'',
      clienteNit:c.cliente?.nit||'',
      numeroFactura:'',cotizacionRef:c.numero,estado:'emitida',
      iva:c.iva,items,
      total:c.total||0,ivaAmt:c.ivaAmt||0,baseAmt:c.baseAmt||0,
      notas:`Generada desde cotización ${c.numero}`,
    };
    dispatch({type:'ADD_ORDEN',payload:factura});
    dispatch({type:'UPDATE_COT',payload:{...c,estado:'pagada'}});
    alert(`✅ Factura de venta creada desde ${c.numero}. Ve al módulo Ventas para completar el N° de factura.`);
  };
  return (
    <div>
      <div style={{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap'}}>
        <div className="search-bar"><Icon name="search"/><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar cotización..."/></div>
        <select className="form-control" style={{width:160}} value={stFilter} onChange={e=>setStFilter(e.target.value)}>
          <option value="">Todos los estados</option>
          <option>pendiente</option><option>enviada</option><option>aprobada</option><option>rechazada</option><option>pagada</option>
        </select>
        {canEdit&&<button className="btn btn-primary" onClick={()=>{setEditing(null);setShowForm(true);}} style={{marginLeft:'auto'}}><Icon name="plus"/>Nueva Cotización</button>}
      </div>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>Número</th><th>Fecha</th><th>Cliente / Empresa</th><th>Ítems</th><th>Total</th><th>Estado</th><th>Acciones</th></tr></thead>
            <tbody>
              {cots.length===0?<tr><td colSpan="7" style={{textAlign:'center',color:'#aaa',padding:30}}>Sin cotizaciones. Crea tu primera.</td></tr>:
              cots.map(c=>(
                <tr key={c.id}>
                  <td><strong>{c.numero}</strong></td>
                  <td>{fmtDate(c.fecha)}</td>
                  <td>{c.cliente?.empresa||c.cliente?.nombre||'—'}<br/><span style={{fontSize:11,color:'#aaa'}}>{c.cliente?.nombre}</span></td>
                  <td>{c.items?.length||0}</td>
                  <td><strong>{fmtQ(c.total)}</strong></td>
                  <td><span className={`status-badge status-${c.estado}`}>{c.estado}</span></td>
                  <td>
                    <div style={{display:'flex',gap:4}}>
                      <button className="btn btn-sm btn-secondary" onClick={()=>setViewing(c)} title="Ver PDF"><Icon name="eye" size={12}/></button>
                      {canEdit&&<button className="btn btn-sm btn-outline" onClick={()=>{setEditing(c);setShowForm(true);}} title="Editar"><Icon name="edit" size={12}/></button>}
                      {canEdit&&<button className="btn btn-sm" style={{background:'#008000',color:'#fff',padding:'3px 7px',borderRadius:5,border:'none',cursor:'pointer',fontSize:11,fontWeight:600}} onClick={()=>convertirAVenta(c)} title="Convertir a Factura de Venta">💰 Venta</button>}
                      {canEdit&&<button className="btn btn-sm btn-danger" onClick={()=>setConfirmDel(c.id)} title="Eliminar"><Icon name="trash" size={12}/></button>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      {showForm&&<QuoteForm productos={state.productos} cotizacion={editing} onSave={saveCot} onClose={()=>{setShowForm(false);setEditing(null);}}/>}
      {viewing&&<QuotePrint q={viewing} onClose={()=>setViewing(null)}/>}
      {confirmDel&&<Confirm msg="¿Eliminar esta cotización permanentemente?" onYes={()=>{dispatch({type:'DEL_COT',payload:confirmDel});setConfirmDel(null);}} onNo={()=>setConfirmDel(null)}/>}
    </div>
  );
};

const ProductForm = ({prod, productos, onSave, onClose}) => {
  const [unidades, setUnidades] = useState(loadUnidades());
  const [nuevaUnidad, setNuevaUnidad] = useState('');
  const [mostrarNuevaUnidad, setMostrarNuevaUnidad] = useState(false);
  const [guardando, setGuardando] = useState(false);
  const listaProd = React.useMemo(()=>productos||[], []);
  const [p, setP] = useState(() => {
    if (prod) return prod;
    const cat = 'Medicamentos';
    return {codigo: getNextCode(cat, listaProd), nombre:'', descripcion:'', categoria: cat, tipoProducto:'venta', unidad:'unidad', presentacion:'', precio:0, costo:0, stock:0, stockMin:0, proveedor:'', activo:true};
  });
  const set = (k,v) => setP(x=>({...x,[k]:v}));

  // Auto-generar código al cambiar categoría (solo en nuevo producto)
  const handleCategoriaChange = (cat) => {
    if (!prod) {
      const nextCode = getNextCode(cat, listaProd);
      setP(x=>({...x, categoria:cat, codigo:nextCode}));
    } else {
      set('categoria', cat);
    }
  };

  const agregarUnidad = () => {
    const u = nuevaUnidad.trim().toLowerCase();
    if (!u) return;
    if (unidades.includes(u)) { set('unidad', u); setMostrarNuevaUnidad(false); return; }
    const updated = [...unidades, u];
    saveUnidades(updated);
    setUnidades(updated);
    set('unidad', u);
    setNuevaUnidad('');
    setMostrarNuevaUnidad(false);
  };

  return (
    <Modal title={prod ? 'Editar Producto' : 'Nuevo Producto'} onClose={onClose}
      footer={<><button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
        <button className="btn btn-primary" disabled={guardando} onClick={()=>{if(!p.nombre){alert('Nombre requerido');return;} if(guardando)return; setGuardando(true); onSave({...p,id:p.id||genId()});}}><Icon name="check"/>{guardando?'Guardando...':'Guardar'}</button></>}>
      {/* Fila 1: Categoría (primero) → auto-genera código */}
      <div className="form-row form-row-3">
        <div className="form-group">
          <label className="form-label">Categoría <span style={{color:'var(--orange)'}}>*</span></label>
          <select className="form-control" value={p.categoria} onChange={e=>handleCategoriaChange(e.target.value)}>
            {CATEGORIAS.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div className="form-group">
          <label className="form-label">Código <span style={{fontSize:10,color:'#aaa'}}>(auto)</span></label>
          <input className="form-control" value={p.codigo} onChange={e=>set('codigo',e.target.value)} placeholder="Se genera automáticamente" style={{background:'#fffbf0'}}/>
        </div>
        <div className="form-group">
          <label className="form-label">Tipo de Producto</label>
          <select className="form-control" value={p.tipoProducto||'venta'} onChange={e=>set('tipoProducto',e.target.value)}>
            {TIPOS_PRODUCTO.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
          </select>
        </div>
      </div>
      {/* Fila 2: Nombre */}
      <div className="form-group">
        <label className="form-label">Nombre del Producto <span style={{color:'var(--orange)'}}>*</span></label>
        <input className="form-control" value={p.nombre} onChange={e=>set('nombre',e.target.value)} placeholder="Nombre completo del producto"/>
      </div>
      {/* Fila 3: Presentación + Concentración/Descripción */}
      <div className="form-row form-row-2">
        <div className="form-group">
          <label className="form-label">Presentación</label>
          <select className="form-control" value={p.presentacion||''} onChange={e=>set('presentacion',e.target.value)}>

const Inventario = ({state,dispatch}) => {
  const [tab,setTab] = useState('catalogo');
  const [showForm,setShowForm] = useState(false);
  const [editing,setEditing] = useState(null);
  const [search,setSearch] = useState('');
  const [catF,setCatF] = useState('');
  const [tipoF,setTipoF] = useState('');
  const [sortField,setSortField] = useState('codigo');
  const [sortDir,setSortDir] = useState('asc');
  const [confirmDel,setConfirmDel] = useState(null);
  const {canEdit} = React.useContext(AuthContext);

  const toggleSort = (field) => {
    if(sortField===field) setSortDir(d=>d==='asc'?'desc':'asc');
    else { setSortField(field); setSortDir('asc'); }
  };
  const SortIcon = ({field}) => {
    if(sortField!==field) return <span style={{color:'#ccc',marginLeft:3}}>⇅</span>;
    return <span style={{color:'var(--orange)',marginLeft:3}}>{sortDir==='asc'?'↑':'↓'}</span>;
  };

  const searchTerm = search.trim().toLowerCase();
  const prods = state.productos
    .filter(p=>
      (catF===''||p.categoria===catF)&&
      (tipoF===''||(p.tipoProducto||'venta')===tipoF)&&
      (searchTerm===''||(p.nombre||'').toLowerCase().includes(searchTerm))
    )
    .sort((a,b)=>{
      // Si hay búsqueda activa, mostrar los que coincidan exacto al inicio
      if(searchTerm){
        const aNombre=(a.nombre||'').toLowerCase();
        const bNombre=(b.nombre||'').toLowerCase();
        const aStarts=aNombre.startsWith(searchTerm);
        const bStarts=bNombre.startsWith(searchTerm);
        if(aStarts&&!bStarts) return -1;
        if(!aStarts&&bStarts) return 1;
        return aNombre.localeCompare(bNombre);
      }
      // Sin búsqueda: ordenar por campo seleccionado
      const numFields=['precio','costo','stock','stockMin'];
      if(numFields.includes(sortField)){
        const va=Number(a[sortField]||0);
        const vb=Number(b[sortField]||0);
        return sortDir==='asc'?va-vb:vb-va;
      }
      const va=(a[sortField]||'').toString().toLowerCase();
      const vb=(b[sortField]||'').toString().toLowerCase();
      return sortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
    });
  const alerts = state.productos.filter(p=>p.stock<=p.stockMin&&p.stockMin>0);
  return (
    <div>
      <div className="tabs">
        {[['catalogo','Catálogo de Productos'],['alertas','Alertas de Stock']].map(([k,l])=>(
          <div key={k} className={`tab${tab===k?' active':''}`} onClick={()=>setTab(k)}>{l}{k==='alertas'&&alerts.length>0&&<span className="badge badge-orange" style={{marginLeft:6}}>{alerts.length}</span>}</div>
        ))}
      </div>
      {tab==='catalogo'&&<>
        <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
          <div className="search-bar"><Icon name="search"/><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar producto..."/></div>
          <select className="form-control" style={{width:165}} value={catF} onChange={e=>setCatF(e.target.value)}>
            <option value="">Todas las categorías</option>
            {CATEGORIAS.map(c=><option key={c}>{c}</option>)}
          </select>
          <select className="form-control" style={{width:175}} value={tipoF} onChange={e=>setTipoF(e.target.value)}>
            <option value="">Todos los tipos</option>
            {TIPOS_PRODUCTO.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
          </select>
          {canEdit&&<button className="btn btn-primary" onClick={()=>{setEditing(null);setShowForm(true);}} style={{marginLeft:'auto'}}><Icon name="plus"/>Nuevo Producto</button>}
        </div>
        <div className="card">
          <div className="table-wrap">
            <table>
              <thead><tr>
              <th onClick={()=>toggleSort('codigo')} style={{cursor:'pointer',whiteSpace:'nowrap'}}>Código<SortIcon field="codigo"/></th>
              <th onClick={()=>toggleSort('nombre')} style={{cursor:'pointer',whiteSpace:'nowrap'}}>Nombre<SortIcon field="nombre"/></th>
              <th>Categoría</th><th>Presentación</th><th>Tipo</th>
              <th onClick={()=>toggleSort('precio')} style={{cursor:'pointer',whiteSpace:'nowrap'}}>Precio<SortIcon field="precio"/></th>
              <th>Costo</th>
              <th onClick={()=>toggleSort('stock')} style={{cursor:'pointer',whiteSpace:'nowrap'}}>Stock<SortIcon field="stock"/></th>
              <th>Mín.</th><th>Estado</th><th>Acciones</th>
            </tr></thead>
              <tbody>
                {prods.map(p=>{
                  const stockStatus = p.stock===0&&p.stockMin>0?'agotado':p.stock<=p.stockMin&&p.stockMin>0?'bajo':'ok';
                  return (
                    <tr key={p.id}>
                      <td><code style={{fontSize:11}}>{p.codigo}</code></td>
                      <td><strong>{p.nombre}</strong><br/><span style={{fontSize:11,color:'#aaa'}}>{p.proveedor}</span></td>
                      <td><span style={{fontSize:11,background:'#f0f0f0',padding:'2px 8px',borderRadius:10}}>{p.categoria}</span></td>
                      <td style={{fontSize:11,color:'#666'}}>{p.presentacion||'—'}</td>
                      <td>{getTipoBadge(p.tipoProducto||'venta')}</td>
                      <td>{fmtQ(p.precio)}</td><td>{fmtQ(p.costo)}</td>
                      <td className={stockStatus==='ok'?'stock-ok':stockStatus==='bajo'?'stock-low':'stock-out'}><strong>{p.stock}</strong> {p.unidad}{p.stock===9999?'':'s'}</td>
                      <td>{p.stockMin}</td>
                      <td><span className="status-badge" style={{background:p.activo?'#d1fae5':'#f3f4f6',color:p.activo?'#059669':'#888'}}>{p.activo?'Activo':'Inactivo'}</span></td>
                      <td>
                        <div style={{display:'flex',gap:4}}>
                          {canEdit&&<button className="btn btn-sm btn-outline" onClick={()=>{setEditing(p);setShowForm(true);}}><Icon name="edit" size={12}/></button>}
                          {canEdit&&<button className="btn btn-sm btn-danger" onClick={()=>setConfirmDel(p.id)}><Icon name="trash" size={12}/></button>}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </>}
      {tab==='alertas'&&<div className="card">
        <div className="card-header"><h3>Productos con Stock Bajo o Agotado</h3></div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>Producto</th><th>Categoría</th><th>Stock Actual</th><th>Stock Mínimo</th><th>Estado</th></tr></thead>
            <tbody>
              {alerts.length===0?<tr><td colSpan="5" style={{textAlign:'center',color:'#aaa',padding:20}}>¡Todo el inventario está en orden!</td></tr>:
              alerts.map(p=>(
                <tr key={p.id}>
                  <td><strong>{p.nombre}</strong></td>
                  <td>{p.categoria}</td>
                  <td className={p.stock===0?'stock-out':'stock-low'}><strong>{p.stock}</strong></td>
                  <td>{p.stockMin}</td>
                  <td><span className="status-badge" style={{background:p.stock===0?'#fee2e2':'#fef3c7',color:p.stock===0?'#dc2626':'#d97706'}}>{p.stock===0?'Agotado':'Stock Bajo'}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>}
      {showForm&&<ProductForm prod={editing} productos={state.productos} onSave={p=>{dispatch({type:editing?'UPDATE_PROD':'ADD_PROD',payload:p});setShowForm(false);setEditing(null);}} onClose={()=>{setShowForm(false);setEditing(null);}}/>}
      {confirmDel&&<Confirm msg="¿Eliminar este producto del catálogo?" onYes={()=>{dispatch({type:'DEL_PROD',payload:confirmDel});setConfirmDel(null);}} onNo={()=>setConfirmDel(null)}/>}
    </div>
  );
};

const Finanzas = ({state,dispatch}) => {
  const [showForm,setShowForm] = useState(false);

    (mesF===''||t.fecha?.slice(0,7)===mesF)

  const totalI = trans.filter(t=>t.tipo==='ingreso').reduce((s,t)=>s+t.monto,0);

      </div>
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
        <select className="form-control" style={{width:150}} value={tipoF} onChange={e=>setTipoF(e.target.value)}><option value="">Todos</option><option value="ingreso">Ingresos</option><option value="egreso">Egresos</option></select>
        <input type="month" className="form-control" style={{width:160}} value={mesF} onChange={e=>setMesF(e.target.value)}/>
        {canEdit&&<button className="btn btn-primary" onClick={()=>{setEditing(null);setShowForm(true);}} style={{marginLeft:'auto'}}><Icon name="plus"/>Nueva Transacción</button>}
      </div>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>Fecha</th><th>Tipo</th><th>Categoría</th><th>Descripción</th><th>Referencia</th><th>Monto</th><th>Acciones</th></tr></thead>
            <tbody>
              {trans.length===0?<tr><td colSpan="7" style={{textAlign:'center',color:'#aaa',padding:30}}>Sin transacciones registradas.</td></tr>:
              trans.map(t=>(
                <tr key={t.id}>
                  <td>{fmtDate(t.fecha)}</td>
                  <td><span className={t.tipo==='ingreso'?'fin-ingreso':'fin-egreso'}>{t.tipo}</span></td>
                  <td>{t.categoria}</td>
                  <td>{t.descripcion}</td>
                  <td style={{color:'#aaa',fontSize:12}}>{t.referencia}</td>
                  <td className={t.tipo==='ingreso'?'fin-ingreso':'fin-egreso'}>{t.tipo==='ingreso'?'+':'-'}{fmtQ(t.monto)}</td>
                  <td>
                    <div style={{display:'flex',gap:4}}>
                      {canEdit&&<button className="btn btn-sm btn-outline" onClick={()=>{setEditing(t);setShowForm(true);}}><Icon name="edit" size={12}/></button>}
                      {canEdit&&<button className="btn btn-sm btn-danger" onClick={()=>setConfirmDel(t.id)}><Icon name="trash" size={12}/></button>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      {showForm&&<TransForm trans={editing} onSave={t=>{dispatch({type:editing?'UPDATE_TRANS':'ADD_TRANS',payload:t});setShowForm(false);setEditing(null);}} onClose={()=>{setShowForm(false);setEditing(null);}}/>}
      {confirmDel&&<Confirm msg="¿Eliminar esta transacción?" onYes={()=>{dispatch({type:'DEL_TRANS',payload:confirmDel});setConfirmDel(null);}} onNo={()=>setConfirmDel(null)}/>}
    </div>
  );
};

const FacturaCompraForm = ({productos,proveedores,onSave,onClose}) => {
  const [f,setF] = useState({fecha:new Date().toISOString().slice(0,10),proveedorId:'',proveedorNombre:'',numeroFactura:'',estado:'pendiente',iva:true,items:[],notas:''});
  const [search,setSearch] = useState('');
  const set=(k,v)=>setF(x=>({...x,[k]:v}));
  const addItem=(p)=>setF(x=>{
    const ex=x.items.find(i=>i.productoId===p.id);
    if(ex) return {...x,items:x.items.map(i=>i.productoId===p.id?{...i,cantidad:i.cantidad+1}:i)};
    return {...x,items:[...x.items,{id:genId(),productoId:p.id,nombre:p.nombre,cantidad:1,precioUnitario:p.costo||0,unidad:p.unidad}]};
  });
  const updItem=(id,k,v)=>setF(x=>({...x,items:x.items.map(i=>i.id===id?{...i,[k]:parseFloat(v)||0}:i)}));
  const delItem=(id)=>setF(x=>({...x,items:x.items.filter(i=>i.id!==id)}));
  const subtotal=f.items.reduce((s,i)=>s+(i.cantidad*i.precioUnitario),0);
  // PC: el IVA de compras NO es crédito fiscal — se suma al costo del inventario
  const ivaAmt = f.iva ? parseFloat((subtotal*0.12).toFixed(2)) : 0;
  const total = parseFloat((subtotal+ivaAmt).toFixed(2));
  const prods=productos.filter(p=>p.activo&&(search===''||(p.nombre||'').toLowerCase().includes(search.toLowerCase())));
  const handleSave=()=>{
    if(!f.proveedorNombre||f.items.length===0){alert('Ingresa el proveedor y al menos un ítem.');return;}
    onSave({...f,id:genId(),tipo:'compra',subtotal,ivaAmt,total,updateStock:true});
  };
  return (
    <Modal title="Nueva Factura de Compra" onClose={onClose} size="lg"
      footer={<><button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
      <button className="btn btn-primary" onClick={handleSave}><Icon name="check"/>Registrar Factura</button></>}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        <div>
          <h4 style={{marginBottom:10,fontSize:13,color:'#FF8C00'}}>DATOS DE LA FACTURA</h4>
          <div className="form-row form-row-2">
            <div className="form-group"><label className="form-label">Proveedor*</label>
              <input className="form-control" list="prov-list" value={f.proveedorNombre} onChange={e=>{
                const pv=proveedores.find(p=>p.nombre===e.target.value);
                set('proveedorNombre',e.target.value);
                if(pv) set('proveedorId',pv.id);
              }} placeholder="Nombre del proveedor"/>
              <datalist id="prov-list">{proveedores.map(p=><option key={p.id} value={p.nombre}/>)}</datalist>
            </div>
            <div className="form-group"><label className="form-label">N° Factura</label><input className="form-control" value={f.numeroFactura} onChange={e=>set('numeroFactura',e.target.value)} placeholder="F-0001"/></div>
            <div className="form-group"><label className="form-label">Condición de Pago</label>
              <select className="form-control" value={f.condicionPago||'contado'} onChange={e=>set('condicionPago',e.target.value)}>
                <option value="contado">Contado</option>
                <option value="credito15">Crédito 15 días</option>
                <option value="credito30">Crédito 30 días</option>
              </select>
            </div>
          </div>
          <div className="form-row form-row-2">
            <div className="form-group"><label className="form-label">Fecha</label><input type="date" className="form-control" value={f.fecha} onChange={e=>set('fecha',e.target.value)}/></div>
            <div className="form-group"><label className="form-label">Estado</label>
              <select className="form-control" value={f.estado} onChange={e=>set('estado',e.target.value)}>
                <option value="pendiente">Pendiente</option><option value="recibido">Recibido</option><option value="cancelado">Cancelado</option>
              </select>
            </div>
          </div>
          <h4 style={{margin:'12px 0 8px',fontSize:13,color:'#FF8C00'}}>ÍTEMS DE COMPRA</h4>
          {f.items.length===0?<p style={{color:'#aaa',fontSize:12}}>Selecciona productos →</p>:
          <div style={{maxHeight:180,overflowY:'auto',border:'1px solid var(--border)',borderRadius:6}}>
            <table style={{fontSize:12}}>
              <thead><tr><th style={{padding:'5px 8px',background:'#f8f9fa'}}>Producto</th><th>Cant.</th><th>P. Unit.</th><th>Sub.</th><th></th></tr></thead>
              <tbody>{f.items.map(i=>(
                <tr key={i.id}>
                  <td style={{padding:'5px 8px',maxWidth:120}}>{i.nombre}<br/><span style={{fontSize:9,color:'#aaa'}}>{i.unidad}</span></td>
                  <td><input type="number" min="1" value={i.cantidad} onChange={e=>updItem(i.id,'cantidad',e.target.value)} style={{width:48,padding:'3px',border:'1px solid #ddd',borderRadius:4,fontSize:12}}/></td>
                  <td><input type="number" min="0" step="0.01" value={i.precioUnitario} onChange={e=>updItem(i.id,'precioUnitario',e.target.value)} style={{width:65,padding:'3px',border:'1px solid #ddd',borderRadius:4,fontSize:12}}/></td>
                  <td style={{fontWeight:600}}>{fmtQ(i.cantidad*i.precioUnitario)}</td>
                  <td><button onClick={()=>delItem(i.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#e53e3e'}}>×</button></td>
                </tr>
              ))}</tbody>
            </table>
          </div>}
          <div style={{marginTop:8,padding:8,background:'#fffbf0',borderRadius:6,border:'1px solid #ffe0a0'}}>
            <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:12,marginBottom:6}}>
              <input type="checkbox" checked={f.iva} onChange={e=>set('iva',e.target.checked)}/>
              Factura de proveedor con IVA (12% del proveedor — se suma al costo)
            </label>
            <div style={{fontSize:10,color:'#e67e00',background:'#fff8f0',padding:'3px 7px',borderRadius:4,marginBottom:4}}>
              ⚠ Pequeño Contribuyente: el IVA pagado en compras es costo, no crédito fiscal (Art.45 bis Dto.27-92)
            </div>
            <div style={{fontSize:12,color:'#666',lineHeight:1.9}}>
              <div style={{display:'flex',justifyContent:'space-between'}}><span>Subtotal:</span><span>{fmtQ(subtotal)}</span></div>
              {f.iva&&<div style={{display:'flex',justifyContent:'space-between'}}><span>IVA proveedor (12% → al costo):</span><span>{fmtQ(ivaAmt)}</span></div>}
              <div style={{display:'flex',justifyContent:'space-between',fontWeight:800,color:'#FF8C00',fontSize:14,borderTop:'1px solid #ffd080',paddingTop:4,marginTop:4}}><span>TOTAL:</span><span>{fmtQ(total)}</span></div>
            </div>
          </div>
          <div className="form-group" style={{marginTop:10}}><label className="form-label">Notas</label><textarea className="form-control" rows={2} value={f.notas} onChange={e=>set('notas',e.target.value)}/></div>
        </div>
        <div>
          <h4 style={{marginBottom:8,fontSize:13,color:'#FF8C00'}}>SELECCIONAR PRODUCTOS</h4>
          <div className="search-bar" style={{marginBottom:8}}><Icon name="search"/><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por nombre..."/></div>
          <div style={{maxHeight:420,overflowY:'auto',border:'1px solid var(--border)',borderRadius:7}}>
            {prods.map(p=>(
              <div key={p.id} onClick={()=>addItem(p)} style={{padding:'8px 10px',borderBottom:'1px solid #f0f0f0',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}
                onMouseEnter={e=>e.currentTarget.style.background='#fff8f0'} onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
                <div>
                  <div style={{fontSize:12,fontWeight:600}}>{p.nombre}</div>
                  <div style={{fontSize:10,color:'#aaa'}}>{p.categoria} · {p.codigo} · Stock: {p.stock}</div>
                </div>
                <div style={{textAlign:'right',flexShrink:0,marginLeft:8}}>
                  <div style={{fontWeight:700,color:'#3498db',fontSize:12}}>{fmtQ(p.costo||0)}</div>
                  <div style={{fontSize:10,color:'#aaa'}}>costo /{p.unidad}</div>
                </div>
              </div>
            ))}
            {prods.length===0&&<p style={{padding:20,color:'#aaa',textAlign:'center',fontSize:12}}>Sin resultados</p>}
          </div>
        </div>
      </div>
    </Modal>
  );
};

        <div className="stat-card"><div className="stat-icon" style={{background:'#FF8C00'}}><Icon name="alert" color="#fff"/></div><div className="stat-info"><h4 style={{color:'#FF8C00'}}>{pendientes}</h4><p>Pendientes de recibir</p></div></div>

                <tbody>

                  filtFacturas.map(f=>(
                    <tr key={f.id}>
                      <td>{fmtDate(f.fecha)}</td>
                      <td><strong>{f.proveedorNombre||f.proveedor||'—'}</strong></td>
                      <td style={{color:'#3498db',fontWeight:600}}>{f.numeroFactura||'—'}</td>
                      <td style={{textAlign:'center'}}>{f.items?.length||0}</td>
                      <td>{fmtQ(f.subtotal||f.total||0)}</td>

          <div className="card">
            <div className="table-wrap">
              <table>
                <thead><tr><th>Nombre / Razón Social</th><th>NIT</th><th>Contacto</th><th>Teléfono</th><th>Correo</th><th>Acciones</th></tr></thead>
                <tbody>
                  {(state.proveedores||[]).length===0?<tr><td colSpan="6" style={{textAlign:'center',color:'#aaa',padding:30}}>Sin proveedores registrados.</td></tr>:
                  (state.proveedores||[]).map(p=>(
                    <tr key={p.id}>

          <div className="card">
            <div className="table-wrap">
              <table>
                <thead><tr><th>Fecha</th><th>Proveedor</th><th>N° Factura</th><th>Total</th><th>Pagado</th><th>Saldo</th><th>Estado</th><th>Acciones</th></tr></thead>

      )}

      {showFactura&&<FacturaCompraForm productos={state.productos} proveedores={state.proveedores||[]}
        onSave={f=>{dispatch({type:'ADD_FACTURA_COMPRA',payload:f});setShowFactura(false);}}
        onClose={()=>setShowFactura(false)}/>}
      {showProv&&<ProveedorForm proveedor={editingProv}
        onSave={p=>{dispatch({type:editingProv?'UPDATE_PROVEEDOR':'ADD_PROVEEDOR',payload:p});setShowProv(false);setEditingProv(null);}}
        onClose={()=>{setShowProv(false);setEditingProv(null);}}/>}
      {confirmDel&&<Confirm msg="¿Eliminar esta factura? El stock ingresado NO se revertirá automáticamente." onYes={()=>{dispatch({type:'DEL_ORDEN',payload:confirmDel});setConfirmDel(null);}} onNo={()=>setConfirmDel(null)}/>}

    </div>

};

const FacturaVentaForm = ({productos,clientes,onSave,onClose}) => {
  const [f,setF] = useState({fecha:new Date().toISOString().slice(0,10),clienteNombre:'',clienteNit:'',numeroFactura:'',estado:'emitida',iva:true,items:[],notas:'',cotizacionRef:''});
  const [search,setSearch] = useState('');
  const set=(k,v)=>setF(x=>({...x,[k]:v}));
  const addItem=(p)=>setF(x=>{
    const ex=x.items.find(i=>i.productoId===p.id);
    if(ex) return {...x,items:x.items.map(i=>i.productoId===p.id?{...i,cantidad:i.cantidad+1}:i)};
    return {...x,items:[...x.items,{id:genId(),productoId:p.id,nombre:p.nombre,cantidad:1,precioUnitario:p.precio||0,unidad:p.unidad}]};
  });
  const updItem=(id,k,v)=>setF(x=>({...x,items:x.items.map(i=>i.id===id?{...i,[k]:parseFloat(v)||0}:i)}));
  const delItem=(id)=>setF(x=>({...x,items:x.items.filter(i=>i.id!==id)}));
  const total=f.items.reduce((s,i)=>s+(i.cantidad*i.precioUnitario),0);
  // PC: IVA = 5% sobre ingresos brutos (no se extrae del precio, es pago a SAT)
  const ivaAmt = f.iva ? parseFloat((total * REGIMEN.ivaRate).toFixed(2)) : 0;
  const baseAmt = total;
  const prods=productos.filter(p=>p.activo&&(search===''||(p.nombre||'').toLowerCase().includes(search.toLowerCase())));
  return (
    <Modal title="Nueva Factura de Venta" onClose={onClose} size="lg"
      footer={<><button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
      <button className="btn btn-primary" onClick={()=>{if(!f.clienteNombre||f.items.length===0){alert('Ingresa el cliente y al menos un ítem.');return;} onSave({...f,id:genId(),tipo:'venta',total,ivaAmt,baseAmt});}}><Icon name="check"/>Registrar Factura</button></>}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        <div>
          <h4 style={{marginBottom:10,fontSize:13,color:'#FF8C00'}}>DATOS DE LA FACTURA</h4>
          <div className="form-row form-row-2">
            <div className="form-group"><label className="form-label">Cliente*</label>
              <input className="form-control" list="cli-list-fv" value={f.clienteNombre} onChange={e=>set('clienteNombre',e.target.value)} placeholder="Nombre o empresa"/>
              <datalist id="cli-list-fv">{clientes.map(c=><option key={c.id} value={c.empresa||c.nombre}/>)}</datalist>
            </div>
            <div className="form-group"><label className="form-label">NIT Cliente</label><input className="form-control" value={f.clienteNit} onChange={e=>set('clienteNit',e.target.value)} placeholder="CF o NIT"/></div>
          </div>
          <div className="form-row form-row-2">
            <div className="form-group"><label className="form-label">N° Factura</label><input className="form-control" value={f.numeroFactura} onChange={e=>set('numeroFactura',e.target.value)} placeholder="F-0001"/></div>
            <div className="form-group"><label className="form-label">Condición de Pago</label>
              <select className="form-control" value={f.condicionPago||'contado'} onChange={e=>set('condicionPago',e.target.value)}>
                <option value="contado">Contado</option>
                <option value="credito15">Crédito 15 días</option>
                <option value="credito30">Crédito 30 días</option>
              </select>
            </div>
            <div className="form-group"><label className="form-label">Cotización Ref.</label><input className="form-control" value={f.cotizacionRef} onChange={e=>set('cotizacionRef',e.target.value)} placeholder="COT-001"/></div>
          </div>
          <div className="form-row form-row-2">
            <div className="form-group"><label className="form-label">Fecha</label><input type="date" className="form-control" value={f.fecha} onChange={e=>set('fecha',e.target.value)}/></div>
            <div className="form-group"><label className="form-label">Estado</label>
              <select className="form-control" value={f.estado} onChange={e=>set('estado',e.target.value)}>
                <option value="emitida">Emitida</option><option value="pagada">Pagada</option><option value="anulada">Anulada</option>
              </select>
            </div>
          </div>
          <h4 style={{margin:'12px 0 8px',fontSize:13,color:'#FF8C00'}}>ÍTEMS</h4>
          {f.items.length===0?<p style={{color:'#aaa',fontSize:12}}>Selecciona productos →</p>:
          <div style={{maxHeight:170,overflowY:'auto',border:'1px solid var(--border)',borderRadius:6}}>
            <table style={{fontSize:12}}>
              <thead><tr><th style={{padding:'5px 8px',background:'#f8f9fa'}}>Producto</th><th>Cant.</th><th>Precio</th><th>Sub.</th><th></th></tr></thead>
              <tbody>{f.items.map(i=>(
                <tr key={i.id}>
                  <td style={{padding:'5px 8px'}}>{i.nombre}</td>
                  <td><input type="number" min="1" value={i.cantidad} onChange={e=>updItem(i.id,'cantidad',e.target.value)} style={{width:48,padding:'3px',border:'1px solid #ddd',borderRadius:4,fontSize:12}}/></td>
                  <td><input type="number" min="0" step="0.01" value={i.precioUnitario} onChange={e=>updItem(i.id,'precioUnitario',e.target.value)} style={{width:65,padding:'3px',border:'1px solid #ddd',borderRadius:4,fontSize:12}}/></td>

            <div style={{fontSize:12,color:'#666',lineHeight:1.9}}>
              {f.iva&&<div style={{display:'flex',justifyContent:'space-between',color:'#888',fontSize:11}}><span>IVA PC 5% (a pagar a SAT):</span><span>{fmtQ(ivaAmt)}</span></div>}
              <div style={{display:'flex',justifyContent:'space-between',fontWeight:800,color:'#FF8C00',fontSize:14,borderTop:'1px solid #ffd080',paddingTop:4,marginTop:2}}><span>TOTAL:</span><span>{fmtQ(total)}</span></div>
            </div>
          </div>
          <div className="form-group" style={{marginTop:10}}><label className="form-label">Notas</label><textarea className="form-control" rows={2} value={f.notas} onChange={e=>set('notas',e.target.value)}/></div>
        </div>
        <div>
          <h4 style={{marginBottom:8,fontSize:13,color:'#FF8C00'}}>SELECCIONAR PRODUCTOS</h4>
          <div className="search-bar" style={{marginBottom:8}}><Icon name="search"/><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar..."/></div>
          <div style={{maxHeight:420,overflowY:'auto',border:'1px solid var(--border)',borderRadius:7}}>
            {prods.map(p=>(
              <div key={p.id} onClick={()=>addItem(p)} style={{padding:'8px 10px',borderBottom:'1px solid #f0f0f0',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}

              </div>

            {prods.length===0&&<p style={{padding:20,color:'#aaa',textAlign:'center',fontSize:12}}>Sin resultados</p>}
          </div>
        </div>
      </div>
    </Modal>
  );
};

const RecetaForm = ({receta, productos, onSave, onClose}) => {
  const terminados = productos.filter(p=>p.tipoProducto==='fabricado'||p.tipoProducto==='venta');
  const materiales = productos.filter(p=>p.tipoProducto==='materia_prima'||p.tipoProducto==='empaque'||p.tipoProducto==='uso_interno');
  const [r,setR] = useState(receta||{codigo:'',nombre:'',productoFinalId:'',rendimiento:1,materiales:[]});
  const set=(k,v)=>setR(x=>({...x,[k]:v}));
  const addMat=(p)=>setR(x=>{
    if(x.materiales.find(m=>m.productoId===p.id)) return x;
    return {...x,materiales:[...x.materiales,{productoId:p.id,nombre:p.nombre,cantidad:1,unidad:p.unidad}]};
  });
  const updMat=(id,k,v)=>setR(x=>({...x,materiales:x.materiales.map(m=>m.productoId===id?{...m,[k]:parseFloat(v)||0}:m)}));
  const delMat=(id)=>setR(x=>({...x,materiales:x.materiales.filter(m=>m.productoId!==id)}));
  return (
    <Modal title={receta?'Editar Receta':'Nueva Receta (BOM)'} onClose={onClose} size="lg"
      footer={<><button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
        <button className="btn btn-primary" onClick={()=>{if(!r.nombre||!r.productoFinalId||r.materiales.length===0){alert('Completa todos los campos y agrega materiales.');return;} onSave({...r,id:r.id||genId()});}}><Icon name="check"/>Guardar Receta</button></>}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        <div>
          <div className="form-row form-row-2">
            <div className="form-group"><label className="form-label">Código</label><input className="form-control" value={r.codigo} onChange={e=>set('codigo',e.target.value)} placeholder="REC-004"/></div>
            <div className="form-group"><label className="form-label">Rendimiento (unidades)</label><input type="number" min="1" className="form-control" value={r.rendimiento} onChange={e=>set('rendimiento',parseInt(e.target.value)||1)}/></div>
          </div>
          <div className="form-group"><label className="form-label">Nombre de la Receta</label><input className="form-control" value={r.nombre} onChange={e=>set('nombre',e.target.value)} placeholder="Ej: Gasa Petrolada Paquete x10"/></div>
          <div className="form-group"><label className="form-label">Producto Final*</label>
            <select className="form-control" value={r.productoFinalId} onChange={e=>set('productoFinalId',e.target.value)}>
              <option value="">— Seleccionar producto terminado —</option>
              {terminados.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}
            </select>
          </div>
          <h4 style={{margin:'14px 0 8px',fontSize:13,color:'#FF8C00'}}>MATERIALES REQUERIDOS</h4>
          {r.materiales.length===0?<p style={{color:'#aaa',fontSize:12}}>Agrega materiales desde el panel →</p>:
          <div style={{border:'1px solid var(--border)',borderRadius:7,overflow:'hidden'}}>
            <table style={{fontSize:12,width:'100%'}}>
              <thead><tr><th style={{padding:'6px 8px',background:'#f8f9fa'}}>Material</th><th>Cant.</th><th>Unidad</th><th></th></tr></thead>
              <tbody>{r.materiales.map(m=>(
                <tr key={m.productoId}>
                  <td style={{padding:'5px 8px'}}>{m.nombre}</td>
                  <td><input type="number" min="0.1" step="0.1" value={m.cantidad} onChange={e=>updMat(m.productoId,'cantidad',e.target.value)} style={{width:55,padding:'3px',border:'1px solid #ddd',borderRadius:4,fontSize:12}}/></td>
                  <td style={{color:'#aaa',fontSize:11}}>{m.unidad}</td>
                  <td><button onClick={()=>delMat(m.productoId)} style={{background:'none',border:'none',cursor:'pointer',color:'#e53e3e'}}>×</button></td>
                </tr>
              ))}</tbody>
            </table>
          </div>}
        </div>
        <div>
          <h4 style={{marginBottom:8,fontSize:13,color:'#FF8C00'}}>AGREGAR MATERIALES / INSUMOS</h4>
          <div style={{maxHeight:380,overflowY:'auto',border:'1px solid var(--border)',borderRadius:7}}>
            {materiales.map(p=>(
              <div key={p.id} onClick={()=>addMat(p)} style={{padding:'7px 10px',borderBottom:'1px solid #f0f0f0',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',opacity:r.materiales.find(m=>m.productoId===p.id)?0.4:1}}
                onMouseEnter={e=>e.currentTarget.style.background='#fff8f0'} onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
                <div><div style={{fontSize:12,fontWeight:600}}>{p.nombre}</div><div style={{fontSize:10,color:'#aaa'}}>{getTipoBadge(p.tipoProducto)} · {fmtQ(p.costo)}/u</div></div>
                <div style={{fontSize:11,color:'#aaa'}}>{p.unidad}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </Modal>
  );
};

const NuevaProduccion = ({recetas, productos, onEjecutar, onClose}) => {
  const [recetaId,setRecetaId] = useState('');
  const [cantidad,setCantidad] = useState(1);
  const [notas,setNotas] = useState('');
  const receta = recetas.find(r=>r.id===recetaId);
  const prodFinal = receta ? productos.find(p=>p.id===receta.productoFinalId) : null;

  const calcMateriales = () => {
    if(!receta) return [];
    return receta.materiales.map(m=>{
      const prod = productos.find(p=>p.id===m.productoId);
      const reqTotal = m.cantidad * cantidad;
      const disponible = prod?.stock ?? 0;
      return {...m, reqTotal, disponible, costo: prod?.costo||0, costoTotal:(prod?.costo||0)*reqTotal, ok: disponible>=reqTotal};
    });
  };
  const mats = calcMateriales();
  const costoTotal = mats.reduce((s,m)=>s+m.costoTotal,0);
  const costoUnitario = cantidad>0 ? costoTotal/cantidad : 0;
  const allOk = mats.every(m=>m.ok);

  return (
    <Modal title="Nueva Orden de Producción" onClose={onClose} size="lg"
      footer={<><button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
        <button className="btn btn-success" disabled={!receta||!allOk} onClick={()=>onEjecutar(receta,cantidad,costoTotal,costoUnitario,notas)} style={{opacity:!receta||!allOk?0.5:1}}>
          <Icon name="check"/>Ejecutar Producción
        </button></>}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        <div>
          <div className="form-group"><label className="form-label">Receta / Producto a Fabricar*</label>
            <select className="form-control" value={recetaId} onChange={e=>setRecetaId(e.target.value)}>
              <option value="">— Seleccionar receta —</option>
              {recetas.map(r=><option key={r.id} value={r.id}>{r.nombre}</option>)}
            </select>
          </div>
          <div className="form-row form-row-2">
            <div className="form-group"><label className="form-label">Cantidad a producir</label>
              <input type="number" min="1" className="form-control" value={cantidad} onChange={e=>setCantidad(parseInt(e.target.value)||1)}/>
            </div>
            <div className="form-group"><label className="form-label">Producto Final</label>
              <input className="form-control" readOnly value={prodFinal?.nombre||'—'} style={{background:'#f8f9fa'}}/>
            </div>
          </div>
          <div className="form-group"><label className="form-label">Notas de producción</label>
            <textarea className="form-control" rows={2} value={notas} onChange={e=>setNotas(e.target.value)} placeholder="Lote, observaciones..."/>
          </div>
          {receta&&<>
            <div style={{background:'#fffbf0',border:'1px solid #ffe0a0',borderRadius:8,padding:14,marginTop:8}}>
              <div style={{fontSize:12,color:'#777',marginBottom:6}}>Resumen de Costos</div>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,fontSize:13}}><span>Costo total materiales:</span><strong>{fmtQ(costoTotal)}</strong></div>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,fontSize:13}}><span>Costo unitario estimado:</span><strong>{fmtQ(costoUnitario)}</strong></div>
              {prodFinal&&<div style={{display:'flex',justifyContent:'space-between',fontSize:13,color:'var(--green)'}}><span>Precio de venta:</span><strong>{fmtQ(prodFinal.precio)}</strong></div>}
              {prodFinal&&prodFinal.precio>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#777',marginTop:2}}><span>Margen estimado:</span><span>{(((prodFinal.precio-costoUnitario)/prodFinal.precio)*100).toFixed(1)}%</span></div>}
            </div>
            {!allOk&&<div className="alert alert-warning" style={{marginTop:10}}><Icon name="alert" size={14}/> Stock insuficiente en uno o más materiales.</div>}
          </>}
        </div>
        <div>
          <h4 style={{marginBottom:10,fontSize:13,color:'#FF8C00'}}>VERIFICACIÓN DE MATERIALES</h4>
          {!receta?<p style={{color:'#aaa',fontSize:13}}>Selecciona una receta para ver los materiales requeridos.</p>:
          <div style={{border:'1px solid var(--border)',borderRadius:7,overflow:'hidden'}}>
            <table style={{fontSize:12,width:'100%'}}>
              <thead><tr><th style={{padding:'7px 10px',background:'#f8f9fa'}}>Material</th><th>Requerido</th><th>Disponible</th><th>✓</th></tr></thead>
              <tbody>{mats.map(m=>(
                <tr key={m.productoId}>
                  <td style={{padding:'7px 10px'}}>{m.nombre}</td>
                  <td style={{textAlign:'right',fontWeight:600}}>{m.reqTotal} {m.unidad}</td>
                  <td style={{textAlign:'right',color:m.ok?'var(--green)':'var(--red)',fontWeight:600}}>{m.disponible}</td>
                  <td style={{textAlign:'center',fontSize:16}}>{m.ok?'✅':'❌'}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>}
        </div>
      </div>
    </Modal>
  );
};

const Reportes = ({state}) => {
  const [tab,setTab] = useState('finanzas');
  const {cotizaciones,transacciones,productos,ordenes_produccion} = state;
  const anioActual = new Date().getFullYear();
  const [anioSel,setAnioSel] = useState(anioActual);

  const tabs = [
    {id:'finanzas',label:'💰 Finanzas'},
    {id:'ventas',label:'📋 Cotizaciones'},
    {id:'inventario',label:'📦 Inventario'},
    {id:'produccion',label:'⚙️ Producción'},
    {id:'fcompras',label:'🧾 Fact. Compra'},
    {id:'fventas',label:'🧾 Fact. Venta'},
    {id:'contab',label:'📒 Contabilidad'},
  ];

  /* ─── FINANZAS ─── */
  const transAnio = transacciones.filter(t=>getAnio(t.fecha)===anioSel);
  const ingresosMes = Array(12).fill(0);
  const egresosMes  = Array(12).fill(0);
  transAnio.forEach(t=>{
    const m = getMes(t.fecha);
    if(m<0)return;
    if(t.tipo==='ingreso') ingresosMes[m]+=t.monto;
    else egresosMes[m]+=t.monto;
  });
  const totalI = ingresosMes.reduce((a,b)=>a+b,0);
  const totalE = egresosMes.reduce((a,b)=>a+b,0);
  const utilidad = totalI - totalE;
  const maxMes = Math.max(...ingresosMes,...egresosMes,1);

  const catEgresos = {};
  transAnio.filter(t=>t.tipo==='egreso').forEach(t=>{
    const c = t.categoria||'Sin categoría';
    catEgresos[c]=(catEgresos[c]||0)+t.monto;
  });
  const catIngr = {};
  transAnio.filter(t=>t.tipo==='ingreso').forEach(t=>{
    const c = t.categoria||'Sin categoría';
    catIngr[c]=(catIngr[c]||0)+t.monto;
  });

  /* ─── VENTAS/COTIZACIONES ─── */
  const cotAnio = cotizaciones.filter(c=>getAnio(c.fecha)===anioSel);
  const porEstado = {};
  cotAnio.forEach(c=>{const e=c.estado||'pendiente';porEstado[e]=(porEstado[e]||0)+1;});
  const ventasMes = Array(12).fill(0);
  cotAnio.filter(c=>c.estado==='pagada'||c.estado==='aprobada').forEach(c=>{
    const m=getMes(c.fecha); if(m>=0) ventasMes[m]+=c.total||0;
  });
  const totalVentas = ventasMes.reduce((a,b)=>a+b,0);
  const cotAprobadas = cotAnio.filter(c=>c.estado==='aprobada'||c.estado==='pagada').length;
  const tasaConv = cotAnio.length>0 ? (cotAprobadas/cotAnio.length*100) : 0;

  // margen promedio de cotizaciones con costo
  const cotConCosto = cotAnio.filter(c=>c.costoTotal>0);
  const margenProm = cotConCosto.length>0
    ? cotConCosto.reduce((s,c)=>s+(c.margenPct||0),0)/cotConCosto.length : 0;
  const gananciaBruta = cotAnio.reduce((s,c)=>s+(c.ganancia||0),0);

  // top clientes por total cotizado
  const clienteMap = {};
  cotAnio.forEach(c=>{
    const k = c.cliente?.empresa||c.cliente?.nombre||'Sin nombre';
    clienteMap[k]=(clienteMap[k]||0)+(c.total||0);
  });
  const topClientes = Object.entries(clienteMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxCliente = topClientes[0]?.[1]||1;

  /* ─── INVENTARIO ─── */
  const prodsActivos = productos.filter(p=>p.activo);
  const valorTotal = prodsActivos.reduce((s,p)=>s+(p.stock||0)*(p.costo||0),0);
  const valorVenta = prodsActivos.reduce((s,p)=>s+(p.stock||0)*(p.precio||0),0);
  const bajoMinimo = prodsActivos.filter(p=>(p.stock||0)<=(p.stockMin||0)&&p.stockMin>0);

  const catValor = {};
  prodsActivos.forEach(p=>{
    const c=p.categoria||'Otros';
    catValor[c]=(catValor[c]||0)+(p.stock||0)*(p.costo||0);
  });
  const catValorArr = Object.entries(catValor).sort((a,b)=>b[1]-a[1]);
  const maxCatV = catValorArr[0]?.[1]||1;

  const top10Stock = [...prodsActivos].sort((a,b)=>((b.stock||0)*(b.precio||0))-((a.stock||0)*(a.precio||0))).slice(0,10);

  /* ─── PRODUCCIÓN ─── */
  const prodAnio = ordenes_produccion.filter(o=>getAnio(o.fecha)===anioSel);
  const prodMes = Array(12).fill(0);
  const costoProdMes = Array(12).fill(0);
  prodAnio.forEach(o=>{
    const m=getMes(o.fecha); if(m>=0){prodMes[m]+=o.cantidad||0;costoProdMes[m]+=o.costoTotal||0;}
  });
  const totalUnidProd = prodMes.reduce((a,b)=>a+b,0);
  const totalCostoProd = costoProdMes.reduce((a,b)=>a+b,0);
  const maxProd = Math.max(...costoProdMes,1);

  const recetaMap = {};
  prodAnio.forEach(o=>{
    const k=o.recetaNombre||'?';
    if(!recetaMap[k]) recetaMap[k]={unidades:0,costo:0};
    recetaMap[k].unidades+=o.cantidad||0;
    recetaMap[k].costo+=o.costoTotal||0;
  });
  const recetaArr = Object.entries(recetaMap).sort((a,b)=>b[1].costo-a[1].costo);

                {MESES.map((m,i)=>(
                  <div key={m} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                    <div style={{width:'70%',background:'#3498db',borderRadius:'3px 3px 0 0',height:`${(compMes[i]/maxCompMes)*80}px`,minHeight:compMes[i]>0?2:0}} title={fmtQ(compMes[i])}/>
                    <div style={{fontSize:9,color:'#999'}}>{m}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{background:'#fff',border:'1px solid var(--border)',borderRadius:10,padding:16}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:12}}>Top Proveedores por Monto</div>
              {topProv.length===0?<p style={{color:'#aaa',fontSize:12}}>Sin datos</p>:
              topProv.map(([n,v])=>(
                <div key={n} style={{marginBottom:8}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}><span>{n}</span><strong style={{color:'#3498db'}}>{fmtQ(v)}</strong></div>

            <div style={{fontWeight:700,fontSize:13,marginBottom:12}}>Historial de Facturas de Compra — {anioSel}</div>
            {facComp.length===0?<p style={{color:'#aaa',fontSize:12}}>Sin facturas de compra en {anioSel}</p>:

              <table style={{fontSize:12,width:'100%'}}>
